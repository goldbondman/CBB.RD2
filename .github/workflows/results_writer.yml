name: results-writer

on:
  schedule:
    # Runs after Update ESPN CBB Data (10:00 UTC) so final scores in data/games.csv
    # are refreshed before writing outcomes.
    - cron: "30 11 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print without writing)"
        required: false
        default: "false"
      lookback_days:
        description: "Days to look back for missing results"
        required: false
        default: "3"

permissions:
  contents: write

jobs:
  write-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy

      - name: Write results
        run: |
          python results_writer.py \
            --predictions-path data/reports/game_predictions_master.csv \
            --data-dir data/ \
            --dry-run "${{ github.event.inputs.dry_run || 'false' }}" \
            --lookback-days "${{ github.event.inputs.lookback_days || '3' }}"

      - name: Commit updated master CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/game_predictions_master.csv
          git diff --staged --quiet || git commit -m "chore: write ides game results [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
