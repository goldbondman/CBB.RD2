name: Market Lines Capture

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 15-23,0-4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Capture mode'
        default: 'pregame'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest rolling predictions artifact
        uses: actions/download-artifact@v4
        with:
          name: cbb-predictions-rolling-latest
          path: data/
        continue-on-error: true

      - name: Download legacy predictions artifact (backward compatibility)
        uses: actions/download-artifact@v4
        with:
          name: cbb-predictions-latest
          path: data/
        continue-on-error: true

      - name: Download existing market lines
        uses: actions/download-artifact@v4
        with:
          name: cbb-market-lines
          path: data/
        continue-on-error: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify artifact handoff inputs
        run: |
          echo "=== Files available before capture ==="
          ls -lh data/predictions_latest.csv 2>/dev/null || echo "predictions_latest.csv: NOT FOUND"
          ls -lh data/predictions_combined_latest.csv 2>/dev/null || echo "predictions_combined_latest.csv: NOT FOUND"
          ls -lh data/market_lines.csv 2>/dev/null || echo "market_lines.csv: NOT FOUND"

          if [ ! -f data/predictions_combined_latest.csv ] && [ -f data/predictions_latest.csv ]; then
            cp data/predictions_latest.csv data/predictions_combined_latest.csv
            echo "[INFO] Created predictions_combined_latest.csv from predictions_latest.csv"
          fi

      - name: Capture market lines
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "11" ]; then MODE="morning"
            elif [ "$HOUR" = "05" ]; then MODE="postgame"
            else MODE="pregame"
            fi
          fi
          python -m ingestion.market_lines --mode "$MODE"

      - name: Build predictions with context
        run: python -m enrichment.predictions_with_context

      - name: Upload market lines artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-market-lines
          path: |
            data/market_lines.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Upload predictions-with-context artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-predictions-with-context
          path: data/predictions_with_context.csv
          retention-days: 30
