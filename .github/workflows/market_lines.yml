name: Market Lines Capture

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 15-23,0-4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Capture mode'
        default: 'pregame'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download predictions artifact
        uses: actions/download-artifact@v4
        with:
          name: cbb-predictions-rolling-latest
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download existing market lines
        uses: actions/download-artifact@v4
        with:
          name: cbb-market-lines
          path: data/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify artifact handoff inputs
        run: |
          echo "=== Prediction files available ==="

          fallback() {
            local file=$1
            if [ -f "$file" ]; then
              echo "[OK] $file ($(wc -l < $file) lines)"
            else
              if git show HEAD:"$file" > "$file" 2>/dev/null; then
                echo "[FALLBACK] $file restored from repo ($(wc -l < $file) lines)"
              else
                echo "[WARN] $file not available from artifact or repo"
              fi
            fi
          }

          fallback data/predictions_latest.csv
          fallback data/market_lines.csv

          for f in \
            data/predictions_combined_latest.csv \
            data/predictions_rolling_latest.csv \
            data/ensemble_predictions_latest.csv; do
            if [ -f "$f" ]; then
              echo "[OK] $f"
            else
              git show HEAD:"$f" > "$f" 2>/dev/null && \
                echo "[FALLBACK] $f from repo" || \
                echo "[SKIP] $f not available"
            fi
          done

          if [ ! -f data/predictions_combined_latest.csv ] && \
             [ -f data/predictions_latest.csv ]; then
            cp data/predictions_latest.csv data/predictions_combined_latest.csv
            echo "[ALIAS] predictions_combined_latest.csv created from predictions_latest.csv"
          fi

          echo "=== Final state ==="
          ls -lh data/predictions*.csv 2>/dev/null

      - name: Capture market lines
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "11" ]; then MODE="morning"
            elif [ "$HOUR" = "05" ]; then MODE="postgame"
            else MODE="pregame"
            fi
          fi
          python -m ingestion.market_lines --mode "$MODE"

      - name: Build predictions with context
        run: python -m enrichment.predictions_with_context

      - name: Upload market lines artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-market-lines
          path: |
            data/market_lines.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Upload predictions-with-context artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-predictions-with-context
          path: data/predictions_with_context.csv
          retention-days: 30
