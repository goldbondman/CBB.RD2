name: Market Lines Capture

on:
  schedule:
    - cron: '0 15-23,0-4 * * *'  # hourly pregame window
    - cron: '0 5 * * *'          # 9 PM PST — postgame/closing
  workflow_run:
    workflows: ["CBB Predictions Rolling"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Capture mode'
        default: 'pregame'
      start_date:
        description: 'Optional backfill start date (YYYY-MM-DD)'
        required: false
        default: ''
      end_date:
        description: 'Optional backfill end date (YYYY-MM-DD)'
        required: false
        default: ''
      days_back:
        description: 'Fallback rolling window (days) when no explicit date range provided'
        required: false
        default: ''
      append:
        description: 'Append to existing target file instead of rewriting'
        required: false
        default: 'true'
      target_file:
        description: 'Durable market lines target file'
        required: false
        default: 'data/market_lines_master.csv'

# Standardized concurrency group to prevent race conditions across all pipeline workflows
concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      # Standard checkout step
      - name: Checkout repo
        uses: actions/checkout@v4

      # Pattern 4: Rewritten Set up Python (must be before download)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Download from the upstream CBB Predictions Rolling run when this workflow is
      # triggered via workflow_run. For other trigger types, we rely on git bootstrap.
      - name: Download predictions artifact (workflow_run trigger)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: INFRA-predictions-rolling
          path: data/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Skip artifact download for scheduled/manual runs
        if: github.event_name != 'workflow_run'
        run: echo "[INFO] No upstream run context available; using repo fallback files"

      # Verify predictions files exist with real data rows
      - name: Verify predictions files
        run: |
          fail=0
          for f in data/predictions_latest.csv data/predictions_combined_latest.csv; do
            rows=$(( $(wc -l < "$f" 2>/dev/null || echo 0) - 1 ))
            if [ "$rows" -lt 1 ]; then
              echo "[ERROR] $f has $rows data rows — aborting"
              fail=1
            else
              echo "[OK] $f: $rows rows"
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      # Pattern 5: Install dependencies with import guards
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy" || \
            { echo "[ERROR] Core dependency import failed"; exit 1; }

      # Pattern 6: Bootstrap empty files (headers if missing)
      - name: Initialize data directory
        run: |
          mkdir -p data
          MASTER_FILE="${{ github.event.inputs.target_file || 'data/market_lines_master.csv' }}"
          if [ ! -f "$MASTER_FILE" ]; then
            echo "game_id,event_id,home_team_name,away_team_name,home_team_id,away_team_id,capture_type,captured_at_utc,pulled_at_utc,verification_status,verification_notes,home_spread_open,home_spread_current,line_movement,total_open,total_current,pinnacle_spread,draftkings_spread,home_tickets_pct,away_tickets_pct,home_money_pct,away_money_pct,steam_flag,rlm_flag,rlm_sharp_side,rlm_note,book_disagreement_flag,book_spread_diff,book_sharp_side,book_note,line_freeze_flag,home_win_prob,away_win_prob,home_ats_wins,home_ats_losses,away_ats_wins,away_ats_losses,home_ml,away_ml,spread,dk_spread,total,over_under,book,market_type,source" > "$MASTER_FILE"
            echo "[INIT] Created empty $MASTER_FILE with headers"
          fi
          if [ ! -f data/market_lines.csv ]; then
            echo "[INFO] data/market_lines.csv not present (optional legacy file)"
          fi

      # Execute market lines capture
      - name: Run ingestion/market_lines.py
        run: |
          trim() {
            local value="$1"
            value="${value#${value%%[![:space:]]*}}"
            value="${value%${value##*[![:space:]]}}"
            printf '%s' "$value"
          }

          MODE="${{ github.event.inputs.mode }}"
          START_DATE="$(trim "${{ github.event.inputs.start_date }}")"
          END_DATE="$(trim "${{ github.event.inputs.end_date }}")"
          DAYS_BACK="$(trim "${{ github.event.inputs.days_back }}")"
          APPEND="$(trim "${{ github.event.inputs.append || 'true' }}")"
          MASTER_FILE="${{ github.event.inputs.target_file || 'data/market_lines_master.csv' }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "05" ]; then MODE="postgame"
            else MODE="pregame"
            fi
            # If triggered by workflow_run, use 'morning' mode
            if [ "${{ github.event_name }}" = "workflow_run" ]; then MODE="morning"; fi
          fi
          CMD=(python -m ingestion.market_lines \
            --mode "$MODE" \
            --append "$APPEND" \
            --master-file "$MASTER_FILE")

          if [ -n "$START_DATE" ]; then CMD+=(--start-date "$START_DATE"); fi
          if [ -n "$END_DATE" ]; then CMD+=(--end-date "$END_DATE"); fi
          if [ -n "$DAYS_BACK" ]; then CMD+=(--days-back "$DAYS_BACK"); fi

          echo "[INFO] Inputs: start_date='$START_DATE' end_date='$END_DATE' days_back='$DAYS_BACK' append='$APPEND'"
          "${CMD[@]}"

      # Pattern 2: Validate market_lines.csv is non-empty
      - name: Validate market lines output
        run: |
          check_csv() {
            local f="$1" min_rows="${2:-1}"
            if [ ! -f "$f" ]; then
              echo "[ERROR] $f was not created"; exit 1
            fi
            local rows=$(( $(wc -l < "$f") - 1 ))
            if [ "$rows" -lt "$min_rows" ]; then
              echo "[ERROR] $f has $rows data rows (minimum: $min_rows)"; exit 1
            fi
            echo "[OK] $f: $rows rows"
          }
          MASTER_FILE="${{ github.event.inputs.target_file || 'data/market_lines_master.csv' }}"
          check_csv "$MASTER_FILE" 1

      # Run enrichment
      - name: Run enrichment/predictions_with_context.py
        run: python -m enrichment.predictions_with_context

      # Pattern 2: Validate predictions_with_context.csv
      - name: Validate predictions_with_context output
        run: |
          if [ -f data/predictions_with_context.csv ]; then
            rows=$(( $(wc -l < data/predictions_with_context.csv) - 1 ))
            echo "[OK] predictions_with_context.csv: $rows rows"
          else
            echo "[ERROR] data/predictions_with_context.csv was not created"; exit 1
          fi

      # Pattern 10: Upload artifacts even on failure
      - name: Upload market lines artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-market-lines
          path: |
            data/market_lines.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
          retention-days: 7

      # Pattern 10: Upload predictions-with-context artifact
      - name: Upload predictions-with-context artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-predictions-with-context
          path: data/predictions_with_context.csv
          retention-days: 30

      # Pattern 9: Standardized commit step with retry logic
      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          candidate_files=(
            data/market_lines_master.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
            data/predictions_with_context.csv
          )
          files_to_stage=()
          for file in "${candidate_files[@]}"; do
            if [ -f "$file" ]; then
              echo "[OK] Will stage: $file"
              files_to_stage+=("$file")
            else
              echo "[WARN] Missing, skipping: $file"
            fi
          done
          if [ ${#files_to_stage[@]} -eq 0 ]; then
            echo "[SKIP] No files to stage"
            exit 0
          fi
          for file in "${files_to_stage[@]}"; do
            git add "$file"
          done
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          python scripts/assert_market_master_monotonic.py
          git add data/.market_master_rowcount
          git commit -m "market: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
