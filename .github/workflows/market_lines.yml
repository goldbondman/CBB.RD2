name: Market Lines Capture

on:
  schedule:
    - cron: '0 14 * * *'         # 6 AM PST — opening lines posted by now
    - cron: '0 15-23,0-4 * * *'  # hourly pregame window
    - cron: '0 5 * * *'          # 9 PM PST — postgame/closing
  workflow_dispatch:
    inputs:
      mode:
        description: 'Capture mode'
        default: 'pregame'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize data directory
        run: |
          mkdir -p data

          # Show what the artifact download provided
          echo "=== Files available after artifact download ==="
          ls -lh data/predictions*.csv 2>/dev/null || \
            echo "[INFO] No prediction files found (market_lines.py will use ESPN directly)"
          ls -lh data/market_lines.csv 2>/dev/null || \
            echo "[INFO] No existing market_lines.csv found"

          # Initialize empty market_lines.csv on first run
          if [ ! -f data/market_lines.csv ]; then
            echo "event_id,capture_type,captured_at_utc,home_spread_open,\nhome_spread_current,line_movement,total_open,total_current,\npinnacle_spread,draftkings_spread,home_tickets_pct,away_tickets_pct,\nhome_money_pct,away_money_pct,steam_flag,rlm_flag,rlm_sharp_side,\nrlm_note,book_disagreement_flag,book_spread_diff,book_sharp_side,\nline_freeze_flag" > data/market_lines.csv
            echo "[INIT] Created empty market_lines.csv with headers"
          fi

      - name: Capture market lines
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "14" ]; then MODE="morning"
            elif [ "$HOUR" = "05" ]; then MODE="postgame"
            else MODE="pregame"
            fi
          fi
          python -m ingestion.market_lines --mode "$MODE"

      - name: Build predictions with context
        run: python -m enrichment.predictions_with_context

      - name: Verify capture outputs before upload
        run: |
          test -f data/market_lines.csv || { echo "[ERROR] data/market_lines.csv was not created"; exit 1; }

          line_count=$(wc -l < data/market_lines.csv)
          if [ "$line_count" -le 1 ]; then
            echo "[ERROR] market_lines capture produced no data rows (line_count=$line_count)"
            exit 1
          fi

          files_to_upload=0
          for f in data/market_lines.csv data/market_lines_latest.csv data/odds_snapshot.csv; do
            if [ -s "$f" ]; then
              files_to_upload=$((files_to_upload + 1))
            fi
          done

          if [ "$files_to_upload" -eq 0 ]; then
            echo "[ERROR] No market-lines artifact files were generated"
            exit 1
          fi

          ls -lah data/market_lines.csv data/market_lines_latest.csv data/odds_snapshot.csv 2>/dev/null || true

      - name: Upload market lines artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-market-lines
          path: |
            data/market_lines.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
          retention-days: 7
          if-no-files-found: error

      - name: Upload predictions-with-context artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-predictions-with-context
          path: data/predictions_with_context.csv
          retention-days: 30

      - name: Commit market lines to repository
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git add data/market_lines.csv \
                  data/predictions_with_context.csv \
                  2>/dev/null || true

          if git diff --staged --quiet; then
            echo "[SKIP] No market line changes to commit"
            exit 0
          fi

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            git fetch origin main
            git rebase origin/main -X ours --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit 2>/dev/null || true
            }
            git add data/market_lines.csv \
                    data/predictions_with_context.csv \
                    2>/dev/null || true
            if git diff --staged --quiet; then
              echo "[SKIP] Nothing to commit after merge"
              exit 0
            fi
            git commit -m "market: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]" || true
            if git push origin main; then
              echo "[OK] Market lines committed"
              exit 0
            fi
            sleep $((i * 3))
          done
          echo "[WARN] Could not push market lines — will retry next capture"
