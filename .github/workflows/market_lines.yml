name: Market Lines Capture

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 15-23,0-4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Capture mode'
        default: 'pregame'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore data files
        run: |
          mkdir -p data

          # ── Try artifact first (populated after first run) ──
          # (artifact download steps above with continue-on-error
          # already ran — files exist in data/ if found)

          # ── Fallback: fetch today's predictions from ESPN ───
          # If no predictions file exists, run a lightweight fetch
          # so market_lines.py has games to match against.
          if [ ! -f data/predictions_latest.csv ] && \
             [ ! -f data/predictions_combined_latest.csv ]; then
            echo "[INFO] No predictions artifact found."
            echo "[INFO] market_lines.py will use ESPN scoreboard"
            echo "[INFO] directly — no predictions file required."
          else
            echo "[OK] Predictions file available."
            ls -lh data/predictions*.csv 2>/dev/null || true
          fi

          # ── Initialize empty market_lines.csv if missing ────
          if [ ! -f data/market_lines.csv ]; then
            echo "event_id,capture_type,captured_at_utc,home_team,away_team,game_time_utc,home_spread_open,home_spread_current,line_movement,total_open,total_current,pinnacle_spread,draftkings_spread,home_tickets_pct,away_tickets_pct,home_money_pct,away_money_pct,steam_flag,rlm_flag,rlm_sharp_side,rlm_note,book_disagreement_flag,book_spread_diff,book_sharp_side,line_freeze_flag" \
              > data/market_lines.csv
            echo "[INIT] Created empty market_lines.csv with headers"
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture market lines
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "11" ]; then MODE="morning"
            elif [ "$HOUR" = "05" ]; then MODE="postgame"
            else MODE="pregame"
            fi
          fi
          python -m ingestion.market_lines --mode "$MODE"

      - name: Build predictions with context
        run: python -m enrichment.predictions_with_context

      - name: Upload market lines artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-market-lines
          path: |
            data/market_lines.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Upload predictions-with-context artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-predictions-with-context
          path: data/predictions_with_context.csv
          retention-days: 30
