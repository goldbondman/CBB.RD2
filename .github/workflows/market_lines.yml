name: Market Lines Capture

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 15-23,0-4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Capture mode'
        default: 'pregame'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download predictions artifact
        uses: actions/download-artifact@v4
        with:
          name: cbb-predictions-latest
          path: data/
        continue-on-error: true

      - name: Download existing market lines
        uses: actions/download-artifact@v4
        with:
          name: cbb-market-lines
          path: data/
        continue-on-error: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize data directory
        run: |
          mkdir -p data

          # Show what the artifact download provided
          echo "=== Files available after artifact download ==="
          ls -lh data/predictions*.csv 2>/dev/null || \
            echo "[INFO] No prediction files found (market_lines.py will use ESPN directly)"
          ls -lh data/market_lines.csv 2>/dev/null || \
            echo "[INFO] No existing market_lines.csv found"

          # Initialize empty market_lines.csv on first run
          if [ ! -f data/market_lines.csv ]; then
            echo "event_id,capture_type,captured_at_utc,home_spread_open,\nhome_spread_current,line_movement,total_open,total_current,\npinnacle_spread,draftkings_spread,home_tickets_pct,away_tickets_pct,\nhome_money_pct,away_money_pct,steam_flag,rlm_flag,rlm_sharp_side,\nrlm_note,book_disagreement_flag,book_spread_diff,book_sharp_side,\nline_freeze_flag" > data/market_lines.csv
            echo "[INIT] Created empty market_lines.csv with headers"
          fi

      - name: Capture market lines
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "11" ]; then MODE="morning"
            elif [ "$HOUR" = "05" ]; then MODE="postgame"
            else MODE="pregame"
            fi
          fi
          python -m ingestion.market_lines --mode "$MODE"

      - name: Build predictions with context
        run: python -m enrichment.predictions_with_context

      - name: Upload market lines artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-market-lines
          path: |
            data/market_lines.csv
            data/market_lines_latest.csv
            data/odds_snapshot.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Upload predictions-with-context artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbb-predictions-with-context
          path: data/predictions_with_context.csv
          retention-days: 30
