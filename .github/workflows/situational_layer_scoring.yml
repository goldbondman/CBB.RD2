name: situational-layer-scoring

on:
  workflow_run:
    workflows: ["roster-injury-monitor"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  score-layers:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy

      - name: Run pipeline audit
        run: python build_pes_columns.py --audit-only

      - name: Score situational layers
        run: python live_game_scorer.py

      - name: Ensure registry exists
        run: python layer_registry.py

      - name: Commit enriched CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/game_predictions_master.csv
          git add data/actionable/bet_recommendations.csv
          git add data/plumbing/situational_layer_signals.csv
          git add data/layer_registry.csv
          git add pipeline_audit_report.txt
          git diff --staged --quiet || git commit -m "chore: enrich ides predictions with situational layer signals [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
