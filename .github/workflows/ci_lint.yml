name: CI Lint
on:
  push:
    branches: [main, work]
    paths:
      - '**.py'
      - '.github/workflows/**.yml'
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install pandas numpy requests pyyaml --quiet

      - name: Check for unresolved merge conflict markers
        run: |
          conflicts=$(grep -rl "<<<<<<\|=======\|>>>>>>" --include="*.py" . \
            | grep -v ".git" || true)
          if [ -n "$conflicts" ]; then
            echo "FAIL — unresolved merge conflicts in:"
            echo "$conflicts"
            exit 1
          fi
          echo "PASS — no conflict markers"

      - name: Compile check all Python files
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            python -m py_compile "$f" 2>/tmp/compile_err
            if [ $? -ne 0 ]; then
              echo "FAIL: $f"
              cat /tmp/compile_err
              failed=1
            fi
          done < <(find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./__pycache__/*" \
            -print0)
          if [ $failed -ne 0 ]; then exit 1; fi
          echo "PASS — all Python files compile"

      - name: Import check core pipeline modules
        run: |
          python - <<'PY'
          import sys, importlib
          sys.path.insert(0, '.')

          CORE_MODULES = [
              'pipeline_csv_utils',
              'espn_config',
              'models.alpha_evaluator',
          ]
          failed = []
          for mod in CORE_MODULES:
              try:
                  importlib.import_module(mod)
                  print(f'OK: {mod}')
              except Exception as e:
                  print(f'FAIL: {mod} — {e}')
                  failed.append(mod)
          if failed:
              sys.exit(1)
          print('PASS — all core modules importable')
          PY

      - name: Validate workflow YAML
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          failed = []
          for f in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
              except Exception as e:
                  print(f'FAIL: {f.name} — {e}')
                  failed.append(f.name)
          if failed:
              sys.exit(1)
          print(f'PASS — all {len(list(pathlib.Path(".github/workflows").glob("*.yml")))} workflow files valid YAML')
          PY
