name: Player Matchup Overlay

on:
  workflow_dispatch:
    inputs:
      input_csv:
        description: "Optional input CSV path for standalone overlay run"
        required: false
        default: "data/player_overlay_input.csv"
        type: string
      output_csv:
        description: "Output CSV path"
        required: false
        default: "data/player_overlay_predictions.csv"
        type: string
  workflow_call:
    inputs:
      input_csv:
        required: false
        default: "data/player_overlay_input.csv"
        type: string
      output_csv:
        required: false
        default: "data/player_overlay_predictions.csv"
        type: string
  push:
    paths:
      - "models/player_matchup_overlay.py"
      - "scripts/run_player_overlay.py"
      - "tests/test_player_matchup_overlay.py"
      - ".github/workflows/player_overlay.yml"
  pull_request:
    paths:
      - "models/player_matchup_overlay.py"
      - "scripts/run_player_overlay.py"
      - "tests/test_player_matchup_overlay.py"
      - ".github/workflows/player_overlay.yml"

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  TZ: UTC
  PYTHONHASHSEED: "0"

jobs:
  overlay-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          python -m pip install pytest
          python -c "import pandas, numpy, pytest"

      - name: Run overlay tests
        run: python -m pytest -q tests/test_player_matchup_overlay.py

  overlay-run:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    needs: overlay-tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          python -c "import pandas, numpy"

      - name: Resolve input/output paths
        id: resolve_paths
        env:
          INPUT_DISPATCH: ${{ github.event.inputs.input_csv || '' }}
          OUTPUT_DISPATCH: ${{ github.event.inputs.output_csv || '' }}
          INPUT_CALL: ${{ inputs.input_csv || '' }}
          OUTPUT_CALL: ${{ inputs.output_csv || '' }}
        run: |
          set -euo pipefail
          INPUT_PATH="${INPUT_DISPATCH:-${INPUT_CALL:-data/player_overlay_input.csv}}"
          OUTPUT_PATH="${OUTPUT_DISPATCH:-${OUTPUT_CALL:-data/player_overlay_predictions.csv}}"
          if [[ -z "$INPUT_PATH" ]]; then INPUT_PATH="data/player_overlay_input.csv"; fi
          if [[ -z "$OUTPUT_PATH" ]]; then OUTPUT_PATH="data/player_overlay_predictions.csv"; fi
          echo "input_path=$INPUT_PATH" >> "$GITHUB_OUTPUT"
          echo "output_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Validate overlay prerequisites
        run: |
          set -euo pipefail
          INPUT_PATH="${{ steps.resolve_paths.outputs.input_path }}"
          if [[ ! -f "$INPUT_PATH" ]]; then
            missing=("$INPUT_PATH")
            [[ -f data/player_game_metrics.csv ]] || missing+=("data/player_game_metrics.csv")
            [[ -f data/player_availability_features.csv ]] || missing+=("data/player_availability_features.csv")
            [[ -f data/predictions_combined_latest.csv ]] || missing+=("data/predictions_combined_latest.csv")
            echo "[BLOCKED] Overlay input missing. Missing files: ${missing[*]}"
            exit 1
          fi
          bash .github/scripts/check_csv.sh "$INPUT_PATH" 1 "game_id,team_id,opp_team_id,is_home"

      - name: Run overlay model
        run: |
          set -euo pipefail
          python scripts/run_player_overlay.py \
            --input "${{ steps.resolve_paths.outputs.input_path }}" \
            --output "${{ steps.resolve_paths.outputs.output_path }}"

      - name: Validate overlay output
        run: |
          bash .github/scripts/check_csv.sh \
            "${{ steps.resolve_paths.outputs.output_path }}" \
            1 \
            "game_id,predicted_total_adjustment_pts,predicted_spread_adjustment_pts_home"

      - name: Ensure default legacy output path is present
        run: |
          set -euo pipefail
          OUTPUT_PATH="${{ steps.resolve_paths.outputs.output_path }}"
          if [[ "$OUTPUT_PATH" != "data/player_overlay_predictions.csv" ]]; then
            cp "$OUTPUT_PATH" data/player_overlay_predictions.csv
            echo "[OK] copied $OUTPUT_PATH to legacy path data/player_overlay_predictions.csv"
          fi

      - name: Create ready marker
        if: always()
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          marker = {
              "workflow": "player_overlay",
              "run_id": "${{ github.run_id }}",
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "outputs": [
                  "data/player_overlay_predictions.csv"
              ]
          }
          out = Path("data/ready_markers/player_overlay_ready.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(marker, indent=2), encoding="utf-8")
          print(f"[OK] wrote {out}")
          PY

      - name: Generate integrity report
        if: always()
        run: |
          python .github/scripts/data_integrity_report.py \
            --manifest .github/pipeline_contracts/player_overlay.contract.json \
            --workflow-name player_overlay \
            --run-id "${{ github.run_id }}-overlay"

      - name: Upload overlay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-player-overlay-output
          if-no-files-found: error
          path: |
            data/player_overlay_predictions.csv
            data/ready_markers/player_overlay_ready.json
            data/integrity_reports/player_overlay/**
          retention-days: 14

      - name: Upload overlay ready marker
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-ready-player-overlay
          if-no-files-found: error
          path: data/ready_markers/player_overlay_ready.json
          retention-days: 30
