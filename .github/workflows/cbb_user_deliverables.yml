name: CBB User Deliverables

on:
  workflow_run:
    workflows: ["CBB Predictions Rolling"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  deliver:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      PREDICTIONS_FRESHNESS_MAX_HOURS: "6"
      TIMEZONE_LOCAL: "America/Los_Angeles"

    steps:
      - name: Checkout (workflow_run SHA)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (default branch for manual run)
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data directories exist
        run: |
          mkdir -p data/csv
          mkdir -p USER/deliverables

      - name: Hydrate upstream artifacts (manual run safety)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "cbb_predictions_rolling.yml" \
            --artifact-name "INFRA-predictions-rolling" \
            --branch "main" \
            --max-runs 20 \
            --dest "data" || echo "[WARN] No INFRA-predictions-rolling found"

      - name: Sanity-check hydrated data
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ ! -f data/predictions_latest.csv ] && [ ! -f data/predictions_combined_latest.csv ]; then
            echo "[ERROR] No predictions CSV found after hydration; run 'CBB Predictions Rolling' first."
            exit 1
          fi

      - name: Remove repo prediction snapshots before artifact download
        if: github.event_name == 'workflow_run'
        run: rm -f data/predictions_latest.csv data/predictions_mc_latest.csv data/predictions_combined_latest.csv

      - name: Download Predictions Artifact (triggering run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: INFRA-predictions-rolling
          path: data/

      - name: Assert predictions artifact contents
        if: github.event_name == 'workflow_run'
        run: |
          if [ ! -f data/predictions_latest.csv ] && [ ! -f data/predictions_mc_latest.csv ]; then
            echo "[ERROR] Artifact download completed but no predictions file found in data/"
            exit 1
          fi

      - name: Mark artifact-fed data directory
        if: github.event_name == 'workflow_run'
        run: echo "artifact_downloaded_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > data/.artifact_marker.txt

      - name: Debug predictions artifact contents
        run: |
          ls -lah data/
          for f in data/predictions_latest.csv data/predictions_mc_latest.csv data/predictions_combined_latest.csv; do
            if [ -f "$f" ]; then
              echo "[INFO] sha256 $f"
              sha256sum "$f"
              echo "[INFO] head -n 3 $f"
              head -n 3 "$f"
            fi
          done
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          data_dir = Path("data")
          candidates = [
              data_dir / "predictions_latest.csv",
              data_dir / "predictions_mc_latest.csv",
              data_dir / "predictions_combined_latest.csv",
          ]
          timestamp_candidates = [
              "generated_at_utc",
              "run_time_utc",
              "model_run_utc",
              "created_at_utc",
              "pipeline_run_utc",
              "predicted_at_utc",
          ]

          for path in candidates:
              if not path.exists():
                  continue
              df = pd.read_csv(path, low_memory=False)
              print(f"[INFO] file={path} rowcount={len(df)}")
              print(f"[INFO] file_mtime_utc={pd.Timestamp(path.stat().st_mtime, unit='s', tz='UTC').isoformat()}")
              present = [c for c in timestamp_candidates if c in df.columns]
              print(f"[INFO] timestamp_columns_present={present}")
              for col in present:
                  parsed = pd.to_datetime(df[col].astype(str).str.replace('Z', '+00:00', regex=False), errors='coerce', utc=True)
                  if parsed.notna().any():
                      print(f"[INFO] {col}_min={parsed.min().isoformat()} {col}_max={parsed.max().isoformat()}")
                  else:
                      print(f"[INFO] {col}_min=n/a {col}_max=n/a")
          PY

      - name: Validate predictions freshness and schedule recency
        run: python infra/ci/validate_predictions_freshness.py --data-dir data --max-age-hours "$PREDICTIONS_FRESHNESS_MAX_HOURS"

      - name: Build derived user-facing CSVs
        run: python build_derived_csvs.py

      - name: Collect Deliverables
        run: |
          files=(
            "data/bet_recs.csv"
            "data/matchup_preview.csv"
            "data/upset_watch.csv"
            "data/predictions_combined_latest.csv"
            "data/predictions_latest.csv"
            "data/cbb_accuracy_report.csv"
          )

          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              cp "$f" USER/deliverables/
              echo "[OK] copied $f -> USER/deliverables/"
            else
              echo "[WARN] missing $f"
            fi
          done

          if [ -f "USER/deliverables/predictions_combined_latest.csv" ]; then
            mv USER/deliverables/predictions_combined_latest.csv USER/deliverables/daily_predictions.csv
          fi

      - name: Upload USER Deliverables
        uses: actions/upload-artifact@v4
        with:
          name: USER-deliverables
          path: USER/deliverables/
          retention-days: 14

      - name: Summary
        run: |
          {
            echo "## User Deliverables Workflow"
            echo "- Trigger: workflow_run of CBB Predictions Rolling (or manual workflow_dispatch)"
            echo "- Freshness policy: predictions artifact age <= ${PREDICTIONS_FRESHNESS_MAX_HOURS} hours"
            echo "- Guardrail: max game time in predictions must be >= now_utc"
            echo ""
            echo "### Deliverables"
            ls USER/deliverables | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bet_recs.csv data/matchup_preview.csv data/upset_watch.csv
          git add data/csv/bet_recs.csv data/csv/matchup_preview.csv data/csv/upset_watch.csv
          git add USER/deliverables/
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          git commit -m "deliverables: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
