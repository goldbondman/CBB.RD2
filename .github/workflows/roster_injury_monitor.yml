name: roster-injury-monitor

on:
  workflow_run:
    workflows: ["line-movement-tracker"]
    types: [completed]
  schedule:
    # Late-night pre-tip audit window (PT morning).
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print without writing)"
        required: false
        default: "false"

permissions:
  contents: write
  actions: read

jobs:
  check-injuries:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy scipy

      - name: Run injury monitor
        run: |
          python roster_injury_monitor.py \
            --predictions-path data/reports/game_predictions_master.csv \
            --bet-recs-path data/actionable/bet_recommendations.csv \
            --data-dir data/ \
            --dry-run "${{ github.event.inputs.dry_run || 'false' }}"

      - name: Commit flagged CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actionable/bet_recommendations.csv
          git add data/reports/game_predictions_master.csv
          git diff --staged --quiet || git commit -m "chore: injury flags applied [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
