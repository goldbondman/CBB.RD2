name: WagerTalk Historical Odds

on:
  schedule:
    # 12:00 AM PST = 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode: daily (yesterday/today/tomorrow), backfill (multi-year or custom range), custom (legacy target/range handling)."
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - backfill
          - custom
      days_back:
        description: "Optional for backfill mode: number of days back from today (example: 2000)."
        required: false
        default: ""
      target_date:
        description: "Optional date to scrape (YYYY-MM-DD). Used in custom mode."
        required: false
        default: ""
      start_date:
        description: "Optional start date for range backfill/update (YYYY-MM-DD)."
        required: false
        default: ""
      end_date:
        description: "Optional end date for range backfill/update (YYYY-MM-DD)."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TZ: America/Los_Angeles
      PYTHONHASHSEED: "0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          python -c "import pandas, requests"

      - name: Resolve scrape window
        id: target
        shell: bash
        env:
          INPUT_RUN_MODE: ${{ github.event.inputs.run_mode || '' }}
          INPUT_DAYS_BACK: ${{ github.event.inputs.days_back || '' }}
          INPUT_TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date || '' }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date || '' }}
        run: |
          set -euo pipefail
          mode="${INPUT_RUN_MODE:-daily}"
          days_back="${INPUT_DAYS_BACK}"
          target="${INPUT_TARGET_DATE}"
          start="${INPUT_START_DATE}"
          end="${INPUT_END_DATE}"
          force_refresh="false"

          valid_date() {
            [[ "$1" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
          }
          valid_int() {
            [[ "$1" =~ ^[0-9]+$ ]]
          }

          if [[ "$mode" != "daily" && "$mode" != "backfill" && "$mode" != "custom" ]]; then
            echo "[ERROR] Invalid run_mode '$mode'. Use one of: daily, backfill, custom."
            exit 1
          fi

          if [[ "$mode" == "daily" ]]; then
            start="$(date -d 'yesterday' +%F)"
            end="$(date -d 'tomorrow' +%F)"
            force_refresh="true"
          elif [[ "$mode" == "backfill" ]]; then
            if [[ -n "$target" && (-n "$start" || -n "$end" || -n "$days_back") ]]; then
              echo "[ERROR] In backfill mode, provide target_date OR start_date/end_date OR days_back, not multiple."
              exit 1
            fi
            if [[ -n "$start" || -n "$end" ]]; then
              if [[ -z "$start" || -z "$end" ]]; then
                echo "[ERROR] start_date and end_date must both be provided for range backfill."
                exit 1
              fi
              if ! valid_date "$start" || ! valid_date "$end"; then
                echo "[ERROR] Invalid date range start_date='$start' end_date='$end'. Expected YYYY-MM-DD."
                exit 1
              fi
            elif [[ -n "$days_back" ]]; then
              if ! valid_int "$days_back"; then
                echo "[ERROR] days_back must be a non-negative integer."
                exit 1
              fi
              start="$(date -d "-${days_back} days" +%F)"
              end="$(date +%F)"
            elif [[ -n "$target" ]]; then
              if ! valid_date "$target"; then
                echo "[ERROR] Invalid target_date '$target'. Expected YYYY-MM-DD."
                exit 1
              fi
              start="$target"
              end="$target"
              force_refresh="true"
            else
              echo "[ERROR] Backfill mode requires one of: days_back, start_date/end_date, or target_date."
              exit 1
            fi
          else
            if [[ -n "$target" && (-n "$start" || -n "$end") ]]; then
              echo "[ERROR] In custom mode, provide either target_date OR start_date/end_date, not both."
              exit 1
            fi
            if [[ -n "$start" || -n "$end" ]]; then
              if [[ -z "$start" || -z "$end" ]]; then
                echo "[ERROR] start_date and end_date must both be provided for range runs."
                exit 1
              fi
              if ! valid_date "$start" || ! valid_date "$end"; then
                echo "[ERROR] Invalid date range start_date='$start' end_date='$end'. Expected YYYY-MM-DD."
                exit 1
              fi
            else
              if [[ -z "$target" ]]; then
                target="$(date -d 'yesterday' +%F)"
              fi
              if ! valid_date "$target"; then
                echo "[ERROR] Invalid target_date '$target'. Expected YYYY-MM-DD."
                exit 1
              fi
              start="$target"
              end="$target"
              force_refresh="true"
            fi
          fi

          if [[ "$start" > "$end" ]]; then
            echo "[ERROR] start_date must be <= end_date."
            exit 1
          fi

          echo "target_date=$target" >> "$GITHUB_OUTPUT"
          echo "start_date=$start" >> "$GITHUB_OUTPUT"
          echo "end_date=$end" >> "$GITHUB_OUTPUT"
          echo "run_mode=$mode" >> "$GITHUB_OUTPUT"
          echo "force_refresh=$force_refresh" >> "$GITHUB_OUTPUT"
          echo "[INFO] run_mode=$mode force_refresh=$force_refresh window=$start -> $end"

      - name: Scrape and append WagerTalk odds
        run: |
          set -euo pipefail
          mkdir -p data
          START_DATE="${{ steps.target.outputs.start_date }}"
          END_DATE="${{ steps.target.outputs.end_date }}"
          FORCE_REFRESH="${{ steps.target.outputs.force_refresh }}"

          EXTRA_ARGS=()
          if [[ "$FORCE_REFRESH" == "true" ]]; then
            EXTRA_ARGS+=(--no-skip)
          fi

          python -m ingestion.wagertalk_scraper \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --output "data/wagertalk_historical_odds.csv" \
            --delay 2.5 \
            "${EXTRA_ARGS[@]}"

      - name: Deduplicate output by game_date + game_id
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          path = Path("data/wagertalk_historical_odds.csv")
          if not path.exists() or path.stat().st_size == 0:
              raise SystemExit("Missing output file: data/wagertalk_historical_odds.csv")

          df = pd.read_csv(path, low_memory=False)
          if df.empty:
              raise SystemExit("WagerTalk output is empty")

          if "scraped_at_utc" in df.columns:
              df["_scraped_ts"] = pd.to_datetime(df["scraped_at_utc"], utc=True, errors="coerce")
              df = df.sort_values(["game_date", "game_id", "_scraped_ts"], kind="stable")
          else:
              df = df.sort_values(["game_date", "game_id"], kind="stable")

          before = len(df)
          df = df.drop_duplicates(subset=["game_date", "game_id"], keep="last").copy()
          after = len(df)
          if "_scraped_ts" in df.columns:
              df = df.drop(columns=["_scraped_ts"])

          df.to_csv(path, index=False)
          print(f"[INFO] dedupe rows_before={before} rows_after={after} removed={before-after}")
          print(f"[INFO] range {df['game_date'].min()} -> {df['game_date'].max()} | rows={len(df)}")
          PY

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-wagertalk-historical-odds
          if-no-files-found: error
          retention-days: 30
          path: data/wagertalk_historical_odds.csv

      - name: Commit and push updates
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/wagertalk_historical_odds.csv
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi

          git commit -m "data: update WagerTalk odds (${{ steps.target.outputs.run_mode }}) ${{ steps.target.outputs.start_date }}..${{ steps.target.outputs.end_date }} [skip ci]"

          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              echo "[OK] Push succeeded on attempt $i"
              exit 0
            fi
            echo "[WARN] Push failed on attempt $i"
            if [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; then
              git rebase --abort || true
            fi
            sleep $((i * 2))
          done

          echo "[ERROR] Push failed after retries"
          exit 1
