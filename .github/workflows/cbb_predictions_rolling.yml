name: CBB Predictions Rolling

on:
  workflow_run:
    workflows: ["Update ESPN CBB Data"]
    types: [completed]

  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYYMMDD (optional). Blank = rolling 40h from now (PST)."
        required: false
        default: ""
      game_type:
        description: "Game type (affects UWS context and tournament total multipliers)"
        required: false
        default: "regular"
        type: choice
        options:
          - regular
          - conf_tournament
          - ncaa_r1
          - ncaa_r2
      decay:
        description: "Game weight decay function for primary model"
        required: false
        default: "smooth"
        type: choice
        options:
          - smooth
          - plateau
          - simple
      run_ensemble:
        description: "Also run 7-model ensemble (cbb_ensemble.py)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# Standardized concurrency group to prevent race conditions across all pipeline workflows
concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  predict:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    env:
      PREDICTIONS_FRESHNESS_MAX_HOURS: "6"
      TIMEZONE_LOCAL: "America/Los_Angeles"
    permissions:
      contents: write
      actions: write

    steps:
      # Standard checkout step
      - name: Checkout repo
        uses: actions/checkout@v4

      # Ensure directories exist so downstream steps don't fail on missing paths
      - name: Ensure data directories exist
        run: |
          mkdir -p data/csv
          mkdir -p data/raw_json
          touch data/csv/.gitkeep

      # Set up Python before downloading artifacts to ensure environment is ready for any validation scripts
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Download primary data from the triggering ESPN pipeline run.
      - name: Download ESPN CSVs (workflow_run trigger)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: INFRA-espn-data
          path: data/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # For manual dispatch, fetch the latest successful ESPN data artifact run id.
      - name: Resolve latest ESPN data run (workflow_dispatch)
        if: github.event_name != 'workflow_run'
        id: resolve_espn_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/update_espn_cbb.yml/runs"
              "?status=completed&conclusion=success&per_page=1"
          )
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  payload = json.load(resp)
          except urllib.error.HTTPError as exc:
              raise SystemExit(f"[ERROR] Failed to resolve latest ESPN workflow run: HTTP {exc.code}") from exc

          runs = payload.get("workflow_runs", [])
          if not runs:
              raise SystemExit("[ERROR] No successful 'Update ESPN CBB Data' runs found.")
          run_id = runs[0].get("id")
          if not run_id:
              raise SystemExit("[ERROR] Latest ESPN run id missing.")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"run_id={run_id}\n")
          print(f"[INFO] Resolved latest ESPN run id: {run_id}")
          PY

      - name: Download ESPN CSVs (workflow_dispatch latest successful run)
        if: github.event_name != 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: INFRA-espn-data
          path: data/
          run-id: ${{ steps.resolve_espn_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Verify required input files exist with real data rows
      - name: Verify required input files
        run: |
          fail=0
          for f in data/games.csv data/team_game_weighted.csv; do
            rows=$(( $(wc -l < "$f" 2>/dev/null || echo 0) - 1 ))
            if [ "$rows" -lt 1 ]; then
              echo "[ERROR] $f has $rows data rows — aborting"
              fail=1
            else
              echo "[OK] $f: $rows rows"
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      # Pattern 5: Install dependencies with import guards to catch environment issues early
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy, yaml" || \
            { echo "[ERROR] Core dependency import failed"; exit 1; }

      - name: Data quality CI gate
        continue-on-error: true
        run: |
          python scripts/audit_csv_quality.py
          python scripts/ci_data_quality_gate.py

      # Compute travel fatigue before running the model
      - name: Compute travel fatigue features
        run: python cbb_travel_fatigue.py || echo "Travel fatigue computation failed (non-fatal)"

      - name: Data infrastructure health check
        run: python scripts/validate_data_infrastructure.py
        continue-on-error: true

      # Execute primary prediction model
      - name: Run primary model predictions (rolling 40h)
        env:
          TZ: "America/Los_Angeles"
          INPUT_DATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.date || '' }}
          GAME_TYPE:  ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.game_type || 'regular' }}
          DECAY:      ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.decay || 'smooth' }}
        run: |
          python - <<'PY'
          import os, sys, subprocess, pathlib
          import pandas as pd
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          tz         = ZoneInfo("America/Los_Angeles")
          input_date = (os.getenv("INPUT_DATE") or "").strip()
          game_type  = (os.getenv("GAME_TYPE")  or "regular").strip()
          decay      = (os.getenv("DECAY")       or "smooth").strip()
          data_dir   = pathlib.Path("data")

          def run_for_date(yyyymmdd: str) -> None:
              cmd = [
                  sys.executable, "espn_prediction_runner.py",
                  "--date",      yyyymmdd,
                  "--game-type", game_type,
                  "--decay",     decay,
              ]
              print(f"\n[RUN] {' '.join(cmd)}")
              subprocess.run(cmd, check=True)

          if input_date:
              run_for_date(input_date)
          else:
              start_pst = datetime.now(tz=tz)
              end_pst   = start_pst + timedelta(hours=40)
              dates = []
              d = start_pst.date()
              while d <= end_pst.date():
                  dates.append(d.strftime("%Y%m%d"))
                  d += timedelta(days=1)
              for yyyymmdd in dates:
                  run_for_date(yyyymmdd)

          dfs = []
          for p in data_dir.glob("predictions_*.csv"):
              if p.name == "predictions_latest.csv" or p.name == "predictions_primary.csv": continue
              try:
                  df = pd.read_csv(p)
                  if not df.empty: dfs.append(df)
              except: pass

          if not dfs:
              print("[WARN] No predictions generated")
              empty = pd.DataFrame()
              empty.to_csv(data_dir / "predictions_primary.csv", index=False)
              empty.to_csv(data_dir / "predictions_latest.csv", index=False)
          else:
              merged = pd.concat(dfs, ignore_index=True).drop_duplicates(subset=["game_id"], keep="last")
              # Filter out games that have already started (keep only future games)
              now_utc = pd.Timestamp.now(tz="UTC")
              dt_col = next((c for c in ["game_datetime_utc", "game_datetime"] if c in merged.columns), None)
              if dt_col:
                  _dt = pd.to_datetime(merged[dt_col], errors="coerce", utc=True)
                  merged = merged[_dt.isna() | (_dt >= now_utc)]
                  print(f"[INFO] Filtered to {len(merged)} future games (cutoff {now_utc.isoformat()})")
              generated_at_utc = pd.Timestamp.now(tz="UTC").isoformat()
              merged["generated_at_utc"] = generated_at_utc
              merged.to_csv(data_dir / "predictions_primary.csv", index=False)
              merged.to_csv(data_dir / "predictions_latest.csv", index=False)
          PY

      # Pattern 2: Validate that the primary model produced non-empty output
      - name: Validate predictions output
        run: |
          check_csv() {
            local f="$1" min_rows="${2:-1}"
            if [ ! -f "$f" ]; then
              echo "[ERROR] $f was not created"; exit 1
            fi
            local rows=$(( $(wc -l < "$f") - 1 ))
            if [ "$rows" -lt "$min_rows" ]; then
              python - <<'PY'
              from pathlib import Path
              import pandas as pd

              games = Path("data/games.csv")
              if not games.exists():
                  print("[WARN] games.csv missing; allowing empty predictions output.")
                  raise SystemExit(0)

              df = pd.read_csv(games, low_memory=False)
              dt_col = next((c for c in ["game_datetime_utc", "game_datetime", "date"] if c in df.columns), None)
              if not dt_col:
                  print("[WARN] games.csv missing datetime column; allowing empty predictions output.")
                  raise SystemExit(0)

              dt = pd.to_datetime(df[dt_col], errors="coerce", utc=True)
              now = pd.Timestamp.now(tz="UTC")
              window_end = now + pd.Timedelta(hours=48)
              upcoming = int(((dt >= now) & (dt <= window_end)).sum())
              print(f"[INFO] Upcoming games in next 48h from games.csv: {upcoming}")
              if upcoming > 0:
                  print("[ERROR] predictions_latest.csv is empty despite upcoming games in schedule.")
                  raise SystemExit(1)

              print("[WARN] No upcoming games in next 48h; allowing empty predictions output.")
              PY
              return 0
            fi
            echo "[OK] $f: $rows rows"
          }
          check_csv data/predictions_latest.csv 1

      # Run ensemble model if enabled
      - name: Run ensemble model predictions
        if: github.event_name == 'workflow_run' || github.event.inputs.run_ensemble == 'true'
        env:
          TZ: "America/Los_Angeles"
        run: python cbb_ensemble.py || echo "Ensemble failed (non-fatal)"

      # Pattern 2: Validate ensemble output if it was supposed to run
      - name: Validate ensemble output
        if: github.event_name == 'workflow_run' || github.event.inputs.run_ensemble == 'true'
        run: |
          if [ -f data/ensemble_predictions_latest.csv ]; then
            rows=$(( $(wc -l < data/ensemble_predictions_latest.csv) - 1 ))
            echo "[OK] ensemble_predictions_latest.csv: $rows rows"
          else
            echo "[WARN] ensemble_predictions_latest.csv not found"
          fi

      # Merge primary and ensemble for a complete view
      - name: Merge runner + ensemble
        if: always()
        run: |
          python - <<'PY'
          import pathlib, pandas as pd, sys
          data_dir = pathlib.Path("data")
          primary = data_dir / "predictions_primary.csv"
          ensemble = data_dir / "ensemble_predictions_latest.csv"
          out = data_dir / "predictions_combined_latest.csv"
          if not primary.exists():
              print("No primary predictions")
              sys.exit(0)
          p_df = pd.read_csv(primary)
          if ensemble.exists():
              e_df = pd.read_csv(ensemble)
              # Simple merge logic
              combined = p_df.merge(e_df, on="game_id", how="left", suffixes=("", "_ens"))
          else:
              combined = p_df
          # Filter out games that have already started (keep only future games)
          now_utc = pd.Timestamp.now(tz="UTC")
          dt_col = next((c for c in ["game_datetime_utc", "game_datetime"] if c in combined.columns), None)
          if dt_col:
              _dt = pd.to_datetime(combined[dt_col], errors="coerce", utc=True)
              combined = combined[_dt.isna() | (_dt >= now_utc)]
              print(f"[INFO] Filtered combined to {len(combined)} future games (cutoff {now_utc.isoformat()})")
          combined["generated_at_utc"] = pd.Timestamp.now(tz="UTC").isoformat()
          combined.to_csv(out, index=False)
          PY

      # Pattern 2: Validate the final merged output
      - name: Validate merged output
        if: always()
        run: |
          if [ -f data/predictions_combined_latest.csv ]; then
            rows=$(( $(wc -l < data/predictions_combined_latest.csv) - 1 ))
            if [ "$rows" -lt 1 ]; then
              python - <<'PY'
              from pathlib import Path
              import pandas as pd

              games = Path("data/games.csv")
              if not games.exists():
                  print("[WARN] games.csv missing; allowing empty combined output.")
                  raise SystemExit(0)

              df = pd.read_csv(games, low_memory=False)
              dt_col = next((c for c in ["game_datetime_utc", "game_datetime", "date"] if c in df.columns), None)
              if not dt_col:
                  print("[WARN] games.csv missing datetime column; allowing empty combined output.")
                  raise SystemExit(0)

              dt = pd.to_datetime(df[dt_col], errors="coerce", utc=True)
              now = pd.Timestamp.now(tz="UTC")
              window_end = now + pd.Timedelta(hours=48)
              upcoming = int(((dt >= now) & (dt <= window_end)).sum())
              print(f"[INFO] Upcoming games in next 48h from games.csv: {upcoming}")
              if upcoming > 0:
                  print("[ERROR] predictions_combined_latest.csv is empty despite upcoming games in schedule.")
                  raise SystemExit(1)

              print("[WARN] No upcoming games in next 48h; allowing empty combined output.")
              PY
              exit 0
            fi
            echo "[OK] predictions_combined_latest.csv: $rows rows"
          fi


      - name: Append to predictions history
        if: always()
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          latest = Path("data/predictions_combined_latest.csv")
          history = Path("data/predictions_history.csv")

          if not latest.exists() or latest.stat().st_size == 0:
              print("[SKIP] No predictions to append")
              raise SystemExit(0)

          new_rows = pd.read_csv(latest, dtype=str)
          existing = pd.read_csv(history, dtype=str) if history.exists() else pd.DataFrame()
          combined = pd.concat([existing, new_rows], ignore_index=True)
          combined = combined.drop_duplicates(subset=["game_id"], keep="last")
          combined.to_csv(history, index=False)
          print(f"[OK] predictions_history.csv: {len(combined)} total rows "
                f"({len(existing)} existing + {len(new_rows)} new)")
          PY

      # Run additional simulations and enrichment
      - name: Run Monte Carlo
        continue-on-error: true
        run: python cbb_monte_carlo.py --input data/predictions_combined_latest.csv --n-sims 5000

      - name: Run player matchup enrichment
        continue-on-error: true
        run: python cbb_player_matchup.py --games data/predictions_combined_latest.csv

      - name: Validate predictions freshness (fail-fast gate)
        continue-on-error: true
        run: python infra/ci/validate_predictions_freshness.py --data-dir data --max-age-hours "$PREDICTIONS_FRESHNESS_MAX_HOURS"

      - name: Build derived CSVs (bet_recs, matchup preview, upset watch)
        continue-on-error: true
        run: python build_derived_csvs.py

      # Pattern 10: Upload artifacts even on failure to aid debugging
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-predictions-rolling
          path: |
            data/predictions_latest.csv
            data/predictions_mc_latest.csv
            data/predictions_combined_latest.csv
            data/predictions_primary.csv
            data/predictions_*.csv
            data/ensemble_predictions_latest.csv
            data/predictions_history.csv
            data/dq_skipped_games.csv
          retention-days: 90

      # Pattern 9: Standardized commit step with retry logic and "nothing to commit" handling
      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions_history.csv
          git add data/predictions_combined_latest.csv
          git add data/
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          git commit -m "pipeline: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
