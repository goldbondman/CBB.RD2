name: Update ESPN CBB Data

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days back to fetch (default 3, use 120 for full season backfill)"
        required: false
        default: "3"
      run_rankings:
        description: "Build CAGE rankings after pipeline"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      game_type:
        description: "Game type context for predictions (affects totals multiplier)"
        required: false
        default: "regular"
        type: choice
        options:
          - regular
          - conf_tournament
          - ncaa_r1
          - ncaa_r2
  schedule:
    - cron: "0 10 * * *"   # 10:00 AM UTC daily (2 AM PST / 3 AM PDT)

permissions:
  contents: write
  actions: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — DATA PIPELINE
  # Fetch ESPN data, compute all metrics, write CSVs
  # ════════════════════════════════════════════════════════════════════════════
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      pipeline_success: ${{ steps.run_pipeline.outputs.success }}
      game_count:       ${{ steps.run_pipeline.outputs.game_count }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure data directories exist and are git-tracked
        run: |
          mkdir -p data/csv
          mkdir -p data/raw_json
          touch data/csv/.gitkeep
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/csv/.gitkeep 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify .gitignore is not blocking CSV files
        run: |
          if git check-ignore -q data/csv/backtest_summary.csv 2>/dev/null; then
            echo "[WARN] data/csv/ is being ignored by .gitignore — fix required"
            echo "       Remove any data/ or *.csv entries from .gitignore"
            exit 1
          else
            echo "[OK] data/csv/ is not ignored"
          fi

      - name: Download previous ESPN CSVs
        uses: actions/download-artifact@v4
        with:
          name: espn-cbb-csvs
          path: data/
        continue-on-error: true   # OK to fail on first-ever run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run ESPN pipeline
        id: run_pipeline
        run: |
          python espn_pipeline.py
          echo "success=true" >> $GITHUB_OUTPUT
          GAME_COUNT=$(python -c "
          import pandas as pd, pathlib
          p = pathlib.Path('data/games.csv')
          if p.exists():
              df = pd.read_csv(p)
              print(len(df[df['completed'].astype(str).str.lower() == 'true']))
          else:
              print(0)
          " 2>/dev/null || echo "0")
          echo "game_count=$GAME_COUNT" >> $GITHUB_OUTPUT
        env:
          DAYS_BACK: ${{ github.event.inputs.days_back || '3' }}

      # ── Audit ESPN API field names ────────────────────────────────────────────
      - name: Audit ESPN API stat headers
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib, sys

          KNOWN_TEAM_LABELS = {
              "oreb", "offensiverebounds", "dreb", "defensiverebounds",
              "reb", "rebounds", "totalrebounds",
              "ast", "assists", "to", "turnovers",
              "stl", "steals", "blk", "blocks",
              "pf", "fouls",
          }
          KNOWN_SHOOTING_KEYWORDS = ["goal", "throw", "three"]

          KNOWN_PLAYER_LABELS = {
              "min", "minutes", "pts", "points",
              "fg", "fgm-a", "field goals", "fieldgoals", "fieldgoalsmade", "fgma",
              "3pt", "3p", "3-pt", "3pm-a", "three pointers",
              "threepointers", "threepointsmade", "3ptma", "3fgma",
              "ft", "ftm-a", "free throws", "freethrows", "freethrowsmade", "ftma",
              "oreb", "or", "offensive rebounds",
              "dreb", "dr", "defensive rebounds",
              "reb", "tr", "rebounds", "total rebounds",
              "ast", "a", "assists",
              "stl", "s", "steals",
              "blk", "b", "blocks",
              "to", "tov", "turnovers",
              "pf", "fouls", "personal fouls",
              "pm", "+/-", "plusminus",
          }

          raw_dir = pathlib.Path("data/raw_json")
          json_files = sorted(raw_dir.glob("*.json")) if raw_dir.exists() else []

          if not json_files:
              print("[SKIP] No raw JSON files found in data/raw_json/ — skipping audit")
              sys.exit(0)

          # Use the most recent JSON file
          sample_file = json_files[-1]
          print(f"[INFO] Auditing: {sample_file.name}")
          raw = json.loads(sample_file.read_text())

          audit = {
              "source_file": sample_file.name,
              "team_stat_labels": [],
              "player_stat_labels": [],
              "unmapped_team_labels": [],
              "unmapped_player_labels": [],
          }

          boxscore = raw.get("boxscore", {})

          # ── Team stat labels ──
          seen_team = {}
          for t in boxscore.get("teams", []):
              team_name = t.get("team", {}).get("displayName", "?")
              for s in t.get("statistics", []):
                  name  = s.get("name", "")
                  abbr  = s.get("abbreviation", "")
                  dv    = s.get("displayValue", "")
                  label = abbr.lower().replace(" ", "_") if abbr else name.lower().replace(" ", "_")
                  entry = {"name": name, "abbreviation": abbr, "displayValue": dv, "team": team_name}
                  seen_team[label] = entry

          audit["team_stat_labels"] = list(seen_team.values())

          for label, entry in seen_team.items():
              name_lc = entry["name"].lower()
              is_shooting = any(x in name_lc for x in KNOWN_SHOOTING_KEYWORDS)
              if not is_shooting and label not in KNOWN_TEAM_LABELS:
                  audit["unmapped_team_labels"].append(entry)

          # ── Player stat labels ──
          seen_player = {}
          for team_block in boxscore.get("players", []):
              for pg in team_block.get("statistics", []):
                  raw_keys = list(pg.get("keys") or pg.get("labels") or pg.get("names") or [])
                  for k in raw_keys:
                      k_lower = str(k).strip().lower()
                      seen_player[k_lower] = k  # raw label → original casing

          audit["player_stat_labels"] = [
              {"raw": orig, "lower": k_lower}
              for k_lower, orig in seen_player.items()
          ]

          for k_lower, orig in seen_player.items():
              if k_lower not in KNOWN_PLAYER_LABELS:
                  audit["unmapped_player_labels"].append({"raw": orig, "lower": k_lower})

          # ── Print results ──
          print("\n═══ TEAM STAT LABELS FROM ESPN ════════════════════════")
          for e in audit["team_stat_labels"]:
              print(f"  name={e['name']!r:45s}  abbreviation={e['abbreviation']!r:10s}  sample={e['displayValue']!r}")

          print("\n═══ PLAYER STAT LABELS FROM ESPN ══════════════════════")
          for e in audit["player_stat_labels"]:
              print(f"  raw={e['raw']!r}")

          if audit["unmapped_team_labels"]:
              print("\n⚠️  UNMAPPED TEAM LABELS (not in col_map):")
              for e in audit["unmapped_team_labels"]:
                  print(f"  name={e['name']!r}  abbreviation={e['abbreviation']!r}")
          else:
              print("\n[OK] All team stat labels are accounted for.")

          if audit["unmapped_player_labels"]:
              print("\n⚠️  UNMAPPED PLAYER LABELS (not in PLAYER_STAT_MAP):")
              for e in audit["unmapped_player_labels"]:
                  print(f"  {e['raw']!r}")
          else:
              print("[OK] All player stat labels are accounted for.")

          out = pathlib.Path("data/espn_api_field_audit.json")
          out.write_text(json.dumps(audit, indent=2))
          print(f"\n[OK] Audit saved to {out}")
          PY

      - name: Reconcile ESPN field names
        if: always()
        continue-on-error: true
        run: |
          python field_reconciler.py \
            --audit-path data/espn_api_field_audit.json

      # ── Tournament metrics ────────────────────────────────────────────────
      # Safety net: espn_pipeline.py now calls this inline, but we run it
      # here too so the YML is self-contained if pipeline is run standalone.
      # build_pretournament_snapshot writes the file rankings + predictions need.
      - name: Run tournament metrics
        run: |
          python - <<'PY'
          import pathlib, sys, pandas as pd

          weighted = pathlib.Path("data/team_game_weighted.csv")
          if not weighted.exists() or weighted.stat().st_size < 100:
              print("[SKIP] team_game_weighted.csv not found — skipping tournament metrics")
              sys.exit(0)

          # Skip if pipeline already wrote these (check recency vs weighted)
          snap = pathlib.Path("data/team_pretournament_snapshot.csv")
          if snap.exists() and snap.stat().st_mtime >= weighted.stat().st_mtime:
              print("[SKIP] Snapshot already current (pipeline wrote it)")
              sys.exit(0)

          try:
              from espn_tournament import compute_tournament_metrics, build_pretournament_snapshot

              player_path = pathlib.Path("data/player_game_metrics.csv")
              player_df   = pd.read_csv(player_path) if player_path.exists() else pd.DataFrame()

              df = pd.read_csv(weighted, dtype=str, low_memory=False)
              df["game_datetime_utc"] = pd.to_datetime(df.get("game_datetime_utc"), utc=True, errors="coerce")
              str_cols = {"team_id","team","opponent_id","opponent","home_away",
                          "conference","conf_id","event_id","game_id",
                          "game_datetime_utc","game_datetime_pst","venue",
                          "state","source","parse_version","t_offensive_archetype"}
              for col in df.columns:
                  if col not in str_cols:
                      df[col] = pd.to_numeric(df[col], errors="coerce")

              df_t = compute_tournament_metrics(df, player_df=player_df if not player_df.empty else None)
              df_t.to_csv("data/team_tournament_metrics.csv", index=False)
              print(f"[OK]   team_tournament_metrics.csv: {len(df_t)} rows")

              snap_df = build_pretournament_snapshot(df_t)
              snap_df.to_csv("data/team_pretournament_snapshot.csv", index=False)
              print(f"[OK]   team_pretournament_snapshot.csv: {len(snap_df)} teams")

          except Exception as exc:
              print(f"[WARN] Tournament metrics failed (non-fatal): {exc}")
              import traceback; traceback.print_exc()
          PY

      # ── Rebuild player condition profiles (full history) ──────────────────
      - name: Rebuild player condition profiles (full history)
        continue-on-error: true
        run: python cbb_player_matchup.py --build-profiles-only

      # ── Validate outputs ──────────────────────────────────────────────────
      - name: Validate outputs
        run: |
          python - <<'PY'
          import pandas as pd, sys, pathlib

          required = {
              "data/games.csv":               "scoreboard",
              "data/team_game_logs.csv":       "team logs",
              "data/player_game_logs.csv":     "player logs",
              "data/team_game_metrics.csv":    "advanced metrics",
              "data/team_game_sos.csv":        "SOS metrics",
              "data/team_game_weighted.csv":   "weighted metrics",
              "data/player_game_metrics.csv":  "player metrics",
          }
          optional = {
              "data/player_injury_proxy.csv":        "injury proxy",
              "data/team_injury_impact.csv":          "team injury impact",
              "data/team_tournament_metrics.csv":     "tournament metrics",
              "data/team_pretournament_snapshot.csv": "tournament snapshot",
          }

          ok = True
          for path, label in required.items():
              p = pathlib.Path(path)
              if not p.exists() or p.stat().st_size < 10:
                  print(f"[FAIL] Missing required: {p.name} ({label})")
                  ok = False
              else:
                  df = pd.read_csv(p)
                  print(f"[OK]   {p.name}: {len(df):,} rows, {len(df.columns)} cols")

          for path, label in optional.items():
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"[WARN] Optional missing: {p.name} ({label})")
              else:
                  df = pd.read_csv(p)
                  print(f"[OK]   {p.name}: {len(df):,} rows ({label})")

          if not ok:
              sys.exit(1)

          # Cross-check: completed games → team log rows
          gdf = pd.read_csv("data/games.csv")
          ldf = pd.read_csv("data/team_game_logs.csv")
          completed_ids = set(
              gdf[gdf["completed"].astype(str).str.lower() == "true"]["game_id"].astype(str)
          )
          log_ids = set(ldf["event_id"].astype(str))
          missing = completed_ids - log_ids

          print(f"\nCompleted games:      {len(completed_ids):,}")
          print(f"Games with team logs: {len(log_ids):,}")
          print(f"Missing from logs:    {len(missing)}")

          if missing:
              rate = 1 - len(missing) / max(1, len(completed_ids))
              print(f"Completion rate:      {rate*100:.1f}%")
              for m in sorted(missing)[:20]:
                  print(f"  MISSING: {m}")
              if rate < 0.90:
                  print("[FAIL] Completion rate below 90% threshold")
                  sys.exit(1)
          else:
              print("[OK]   All completed games have team log rows")

          # Data freshness
          df = pd.read_csv("data/games.csv")
          if "game_datetime_utc" in df.columns:
              df["game_datetime_utc"] = pd.to_datetime(df["game_datetime_utc"], utc=True, errors="coerce")
              latest = df["game_datetime_utc"].max()
              if pd.notna(latest):
                  age_hours = (pd.Timestamp.now(tz="UTC") - latest).total_seconds() / 3600
                  print(f"\nLatest game data:     {latest.strftime('%Y-%m-%d %H:%M UTC')}")
                  print(f"Data age:             {age_hours:.1f} hours")
                  if age_hours > 36:
                      print("[WARN] Data is more than 36 hours old — check pipeline schedule")
          PY

      - name: Show output sizes
        if: always()
        run: ls -lh data/*.csv 2>/dev/null || echo "No CSVs found"

      - name: Check for silent empty columns
        if: always()
        continue-on-error: true
        run: |
          python field_reconciler.py --check-outputs --fix-duplicates

      - name: Upload ESPN CSVs (for downstream predictions)
        uses: actions/upload-artifact@v4
        with:
          name: espn-cbb-csvs
          path: |
            data/games.csv
            data/team_game_logs.csv
            data/team_game_metrics.csv
            data/team_game_sos.csv
            data/team_game_weighted.csv
            data/team_tournament_metrics.csv
            data/team_pretournament_snapshot.csv
            data/cbb_rankings.csv
            data/cbb_rankings_by_conference.csv
            data/player_game_logs.csv
            data/player_game_metrics.csv
            data/player_injury_proxy.csv
            data/team_injury_impact.csv
            data/team_form_snapshot.csv
            data/player_condition_profiles.csv
            data/player_archetype_matchup_matrix.csv
            data/espn_api_field_audit.json
            data/field_drift_report.json
            data/field_drift_report.md
            data/pipeline_run_log.csv
            data/csv/backtest_summary.csv
            data/csv/backtest_by_model.csv
            data/csv/backtest_weekly.csv
            data/csv/backtest_by_conference.csv
            data/csv/backtest_calibration.csv
            data/csv/backtest_by_edge.csv
            data/csv/backtest_model_matrix.csv
            data/results_log_graded.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Upload raw JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: espn-cbb-raw-json
          path: data/raw_json/
          retention-days: 3
          if-no-files-found: ignore

      - name: Copy CSVs to data/csv/
        if: success()
        run: |
          mkdir -p data/csv
          for f in data/games.csv data/team_game_weighted.csv data/team_pretournament_snapshot.csv data/player_game_metrics.csv; do
            [ -f "$f" ] && cp "$f" data/csv/ && echo "Copied $f" || echo "Skipped $f (not found)"
          done

      - name: Commit pipeline CSVs to repository
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull origin main --rebase --autostash || true

          git add \
            data/csv/tier_classifications.csv \
            data/csv/team_form_snapshot.csv \
            data/csv/player_leaders.csv \
            data/csv/conference_summary.csv \
            data/csv/backtest_summary.csv \
            data/csv/backtest_by_model.csv \
            data/csv/backtest_weekly.csv \
            data/csv/backtest_by_conference.csv \
            data/csv/backtest_calibration.csv \
            data/csv/backtest_by_edge.csv \
            data/csv/backtest_model_matrix.csv \
            data/csv/backtest_by_tier.csv \
            data/player_condition_profiles.csv \
            data/player_archetype_matchup_matrix.csv \
            data/field_drift_report.json \
            data/field_drift_report.md \
            column_map.json \
            2>/dev/null || true

          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
          else
            git commit -m "pipeline: $(date +'%Y-%m-%d %H:%M UTC') — metrics + backtest [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify CSVs committed successfully
        if: always()
        run: |
          python - <<'PY'
          import subprocess, sys

          result = subprocess.run(
              ["git", "log", "--oneline", "-5"],
              capture_output=True, text=True
          )
          print("[GIT LOG - last 5 commits]")
          print(result.stdout)

          result2 = subprocess.run(
              ["git", "diff", "HEAD~1", "--name-only"],
              capture_output=True, text=True
          )
          committed_files = result2.stdout.strip().split("\n")
          csv_files = [f for f in committed_files if "data/csv" in f or ".csv" in f]

          if csv_files:
              print(f"[OK] {len(csv_files)} CSV file(s) in last commit:")
              for f in csv_files[:10]:
                  print(f"  {f}")
          else:
              print("[WARN] No CSV files found in last commit — check push steps above")
          PY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — CAGE RANKINGS
  # Builds cbb_rankings.csv. Runs in parallel with predictions after update.
  # ════════════════════════════════════════════════════════════════════════════
  rankings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs: update
    if: >
      always() &&
      needs.update.result == 'success' &&
      (github.event.inputs.run_rankings != 'false')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure data directories exist and are git-tracked
        run: |
          mkdir -p data/csv
          mkdir -p data/raw_json
          touch data/csv/.gitkeep
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/csv/.gitkeep 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ESPN CSVs
        uses: actions/download-artifact@v4
        with:
          name: espn-cbb-csvs
          path: data/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Guard: rankings require snapshot — verify it exists before running
      - name: Check snapshot dependency
        run: |
          python - <<'PY'
          import pathlib, sys
          snap = pathlib.Path("data/team_pretournament_snapshot.csv")
          if not snap.exists() or snap.stat().st_size < 100:
              print("[WARN] team_pretournament_snapshot.csv missing or empty.")
              print("       espn_rankings.py will build snapshot from game logs as fallback.")
          else:
              import pandas as pd
              df = pd.read_csv(snap)
              print(f"[OK]   Snapshot present: {len(df)} teams")
          PY

      - name: Build CAGE rankings
        run: python espn_rankings.py --top 25

      - name: Validate rankings output
        run: |
          python - <<'PY'
          import pandas as pd, sys, pathlib

          p = pathlib.Path("data/cbb_rankings.csv")
          if not p.exists():
              print("[FAIL] cbb_rankings.csv not found")
              sys.exit(1)

          df = pd.read_csv(p)
          if df.empty:
              print("[FAIL] Rankings CSV is empty")
              sys.exit(1)

          print(f"[OK]   cbb_rankings.csv: {len(df)} teams, {len(df.columns)} columns")

          required_cols = ["rank","team","cage_em","cage_o","cage_d","barthag",
                           "wab","eff_grade","cage_power_index"]
          missing_cols = [c for c in required_cols if c not in df.columns]
          if missing_cols:
              print(f"[WARN] Missing columns: {missing_cols}")
          else:
              print("[OK]   All required ranking columns present")

          top = df.iloc[0]
          print(f"\nRank 1: {top.get('team','?')} — CAGE_EM: {top.get('cage_em','?')}")
          if pd.to_numeric(top.get('cage_em', 0), errors='coerce') <= 0:
              print("[WARN] Top-ranked team has non-positive CAGE_EM — check data")

          em = pd.to_numeric(df["cage_em"], errors="coerce").dropna()
          print(f"CAGE_EM range:  {em.min():.1f}  to  {em.max():.1f}")
          print(f"Teams ranked:   {len(df)}")
          PY

      - name: Upload rankings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-rankings-${{ github.run_id }}
          path: |
            data/cbb_rankings.csv
            data/cbb_rankings_*.csv
            data/cbb_rankings_by_conference.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Copy CSVs to data/csv/
        if: success()
        run: |
          mkdir -p data/csv
          for f in data/cbb_rankings.csv data/cbb_rankings_by_conference.csv; do
            [ -f "$f" ] && cp "$f" data/csv/ && echo "Copied $f" || echo "Skipped $f (not found)"
          done

      - name: Commit rankings CSVs to repository
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          for attempt in 1 2 3; do
            git pull origin main --rebase --autostash || true

            git add \
              data/csv/cbb_rankings.csv \
              data/csv/cbb_rankings_by_conference.csv \
              data/cbb_rankings.csv \
              data/cbb_rankings_by_conference.csv \
              data/cbb_rankings_$(date +'%Y%m%d').csv \
              2>/dev/null || true

            if git diff --staged --quiet; then
              echo "[SKIP] No ranking changes to commit"
              break
            fi

            git commit -m "rankings: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]" || true

            if git push origin main; then
              echo "[OK] Push succeeded on attempt ${attempt}"
              break
            else
              echo "[RETRY] Push failed on attempt ${attempt} — waiting $((attempt * 10)) seconds"
              sleep $((attempt * 10))
              git reset HEAD~1 2>/dev/null || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — TOMORROW'S PREDICTIONS
  # Runs after pipeline completes. Produces predictions_YYYYMMDD.csv.
  # ════════════════════════════════════════════════════════════════════════════
  predictions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs: update
    if: needs.update.result == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure data directories exist and are git-tracked
        run: |
          mkdir -p data/csv
          mkdir -p data/raw_json
          touch data/csv/.gitkeep
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/csv/.gitkeep 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ESPN CSVs
        uses: actions/download-artifact@v4
        with:
          name: espn-cbb-csvs
          path: data/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run predictions for tomorrow's games
        run: |
          python espn_prediction_runner.py \
            --game-type "${{ github.event.inputs.game_type || 'regular' }}" \
            --decay     "smooth"
        env:
          TZ: "America/Los_Angeles"

      - name: Validate predictions output
        run: |
          python - <<'PY'
          import pandas as pd, pathlib, sys

          p = pathlib.Path("data/predictions_latest.csv")
          if not p.exists():
              print("[WARN] predictions_latest.csv not found — no games tomorrow?")
              sys.exit(0)

          df = pd.read_csv(p)
          if df.empty:
              print("[WARN] No predictions generated — no games scheduled")
              sys.exit(0)

          print(f"[OK]   {len(df)} game prediction(s) written")

          cols = ["home_team","away_team","pred_spread","pred_total",
                  "spread_line","model_confidence","edge_flag"]
          avail = [c for c in cols if c in df.columns]
          pd.set_option("display.max_rows",   50)
          pd.set_option("display.max_columns",15)
          pd.set_option("display.width",      120)
          print("\n" + df[avail].to_string(index=False))

          # Edge alerts
          if "edge_flag" in df.columns:
              edges = df[pd.to_numeric(df["edge_flag"], errors="coerce") == 1]
              if not edges.empty:
                  print(f"\n⚡ {len(edges)} EDGE ALERT(s) — spread diff > 3 pts vs line")

          # UWS alerts
          uws_col = next(
              (c for c in ["uws_total"] if c in df.columns),
              None
          )
          if uws_col:
              alerts = df[pd.to_numeric(df[uws_col], errors="coerce") >= 55]
              if not alerts.empty:
                  print(f"🚨 {len(alerts)} STRONG UPSET ALERT(s) — UWS ≥ 55/70")
                  for _, row in alerts.iterrows():
                      print(f"   {row.get('home_team','?')} vs {row.get('away_team','?')}: "
                            f"UWS {row.get(uws_col, float('nan')):.0f}/70")
          PY

      - name: Upload predictions artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-predictions-${{ github.run_id }}
          path: data/predictions_*.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Commit predictions CSVs to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          for attempt in 1 2 3; do
            git pull origin main --rebase --autostash || true

            git add \
              data/predictions_latest.csv \
              data/predictions_combined_latest.csv \
              data/predictions_primary.csv \
              data/predictions_mc_latest.csv \
              data/ensemble_predictions_latest.csv \
              2>/dev/null || true

            git add data/predictions_*.csv data/ensemble_predictions_*.csv 2>/dev/null || true
            git add data/bet_recs_$(date +'%Y%m%d').csv 2>/dev/null || true

            if git diff --staged --quiet; then
              echo "[SKIP] No prediction changes to commit"
              break
            fi

            git commit -m "predictions: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]" || true

            if git push origin main; then
              echo "[OK] Push succeeded on attempt ${attempt}"
              break
            else
              echo "[RETRY] Push failed on attempt ${attempt} — waiting $((attempt * 10)) seconds"
              sleep $((attempt * 10))
              git reset HEAD~1 2>/dev/null || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
