name: Update ESPN CBB Data

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days back to fetch (default 3, use 120 for full season backfill)"
        required: false
        default: "3"
      run_rankings:
        description: "Build CAGE rankings after pipeline"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      game_type:
        description: "Game type context for predictions (affects totals multiplier)"
        required: false
        default: "regular"
        type: choice
        options:
          - regular
          - conf_tournament
          - ncaa_r1
          - ncaa_r2
  schedule:
    - cron: "0 10 * * *"   # 10:00 AM UTC daily (2 AM PST / 3 AM PDT)

# Standardized concurrency group to prevent race conditions across all pipeline workflows
concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — DATA PIPELINE
  # ════════════════════════════════════════════════════════════════════════════
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      pipeline_success: ${{ steps.run_pipeline.outputs.success }}

    steps:
      # Standard checkout step
      - name: Checkout repo
        uses: actions/checkout@v4

      # Ensure directories exist
      - name: Ensure data directories exist
        run: |
          mkdir -p data/csv
          mkdir -p data/raw_json
          touch data/csv/.gitkeep

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Pattern 5: Install dependencies with import guards
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy" || \
            { echo "[ERROR] Core dependency import failed"; exit 1; }

      # Execute the main data collection pipeline
      - name: Run ESPN pipeline
        id: run_pipeline
        run: |
          python espn_pipeline.py --days-back ${{ github.event.inputs.days_back || '3' }}
          echo "success=true" >> $GITHUB_OUTPUT
        env:
          DAYS_BACK: ${{ github.event.inputs.days_back || '3' }}

      # Pattern 2: Validate team_game_weighted.csv
      - name: Validate team_game_weighted.csv
        run: |
          check_csv() {
            local f="$1" min_rows="${2:-1}"
            if [ ! -f "$f" ]; then
              echo "[ERROR] $f was not created"; exit 1
            fi
            local rows=$(( $(wc -l < "$f") - 1 ))
            if [ "$rows" -lt "$min_rows" ]; then
              echo "[ERROR] $f has $rows data rows (minimum: $min_rows)"; exit 1
            fi
            echo "[OK] $f: $rows rows"
          }
          check_csv data/team_game_weighted.csv 1

      # Pattern 10: Upload artifacts even on failure
      # Standardized name: cbb-espn-data (matches contract table)
      - name: Upload ESPN CSVs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-espn-data
          path: data/
          retention-days: 90

      # Pattern 9: Standardized commit step with retry logic
      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          git commit -m "pipeline: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit 2>&1 || {
                git merge --abort 2>/dev/null || true
                git reset --hard HEAD
              }
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
          exit 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — CAGE RANKINGS
  # ════════════════════════════════════════════════════════════════════════════
  rankings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs: update
    if: always() && needs.update.result == 'success' && (github.event.inputs.run_rankings != 'false')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Download data from previous job. Standardized name: cbb-espn-data.
      - name: Download ESPN CSVs
        uses: actions/download-artifact@v4
        with:
          name: cbb-espn-data
          path: data/
        continue-on-error: true

      # Pattern 1: Verify artifact or bootstrap from git history
      - name: Verify artifact or bootstrap from git
        run: |
          for f in data/team_game_weighted.csv data/team_pretournament_snapshot.csv; do
            _git_lines=$(git show HEAD:"$f" 2>/dev/null | wc -l || echo 0)
            _local_lines=$(wc -l < "$f" 2>/dev/null || echo 0)
            if [ ! -s "$f" ] || [ "$_local_lines" -lt "$_git_lines" ]; then
              echo "[BOOTSTRAP] $f: local=${_local_lines} git=${_git_lines} — restoring from git"
              git show HEAD:"$f" > "$f" 2>/dev/null || echo "[WARN] $f not in git history"
            fi
          done

      # Pattern 5: Install dependencies with import guards
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy" || \
            { echo "[ERROR] Core dependency import failed"; exit 1; }

      # Build CAGE rankings
      - name: Build CAGE rankings
        run: |
          python espn_rankings.py --top 25
          # Backward-compatible fallback if rankings are emitted under data/csv/
          if [ ! -f data/cbb_rankings.csv ] && [ -f data/csv/cbb_rankings.csv ]; then
            cp data/csv/cbb_rankings.csv data/cbb_rankings.csv
            echo "[OK] Copied data/csv/cbb_rankings.csv -> data/cbb_rankings.csv"
          fi

      # Pattern 2: Validate rankings output
      - name: Validate rankings output
        run: |
          if [ -f data/cbb_rankings.csv ]; then
            rows=$(( $(wc -l < data/cbb_rankings.csv) - 1 ))
            if [ "$rows" -lt 1 ]; then
              echo "[ERROR] data/cbb_rankings.csv exists but has no data rows"; exit 1
            fi
            echo "[OK] cbb_rankings.csv: $rows rows"
          else
            echo "[ERROR] data/cbb_rankings.csv was not created"; exit 1
          fi

      # Pattern 10: Upload artifacts even on failure
      - name: Upload rankings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-rankings
          path: data/cbb_rankings.csv
          retention-days: 30

      # Pattern 9: Standardized commit step with retry logic
      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          git commit -m "rankings: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit 2>&1 || {
                git merge --abort 2>/dev/null || true
                git reset --hard HEAD
              }
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
          exit 1

      # Final health check to verify all workflows meet standards
      - name: Validate workflow health
        if: always()
        run: python .github/scripts/validate_workflows.py
