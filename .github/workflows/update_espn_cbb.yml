name: Update ESPN CBB Data

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days back to fetch (default 3, use >180 only for manual backfill)"
        required: false
        default: "3"
      run_rankings:
        description: "Build CAGE rankings after pipeline"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      game_type:
        description: "Game type context for predictions"
        required: false
        default: "regular"
        type: choice
        options:
          - regular
          - conf_tournament
          - ncaa_r1
          - ncaa_r2
      commit_data:
        description: "Commit curated data outputs to main (manual runs only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "0 10 * * *"

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: UTC
  PYTHONHASHSEED: "0"
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      days_back: ${{ steps.resolve_inputs.outputs.days_back }}
      game_type: ${{ steps.resolve_inputs.outputs.game_type }}
      run_rankings: ${{ steps.resolve_inputs.outputs.run_rankings }}
      commit_data: ${{ steps.resolve_inputs.outputs.commit_data }}
      artifact_name: ${{ steps.resolve_inputs.outputs.artifact_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve and validate inputs
        id: resolve_inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DAYS_BACK: ${{ github.event.inputs.days_back }}
          INPUT_RUN_RANKINGS: ${{ github.event.inputs.run_rankings }}
          INPUT_GAME_TYPE: ${{ github.event.inputs.game_type }}
          INPUT_COMMIT_DATA: ${{ github.event.inputs.commit_data }}
        run: |
          set -euo pipefail

          DAYS_BACK="${INPUT_DAYS_BACK:-3}"
          if [[ -z "$DAYS_BACK" ]]; then
            DAYS_BACK="3"
          fi
          if ! [[ "$DAYS_BACK" =~ ^[0-9]+$ ]]; then
            echo "[ERROR] days_back must be numeric; got '$DAYS_BACK'"
            exit 1
          fi
          DAYS_BACK_INT=$((DAYS_BACK))
          if (( DAYS_BACK_INT < 1 )); then
            echo "[ERROR] days_back must be >= 1"
            exit 1
          fi
          if (( DAYS_BACK_INT > 180 )); then
            if [[ "$EVENT_NAME" != "workflow_dispatch" ]]; then
              echo "[ERROR] days_back > 180 is only allowed on manual workflow_dispatch runs"
              exit 1
            fi
            echo "[WARN] manual backfill requested with days_back=$DAYS_BACK_INT"
          fi

          RUN_RANKINGS="${INPUT_RUN_RANKINGS:-true}"
          if [[ -z "$RUN_RANKINGS" ]]; then
            RUN_RANKINGS="true"
          fi
          case "$RUN_RANKINGS" in
            true|false) ;;
            *) echo "[ERROR] run_rankings must be true or false"; exit 1 ;;
          esac

          COMMIT_DATA="${INPUT_COMMIT_DATA:-false}"
          if [[ "$EVENT_NAME" != "workflow_dispatch" ]]; then
            COMMIT_DATA="false"
          fi
          case "$COMMIT_DATA" in
            true|false) ;;
            *) echo "[ERROR] commit_data must be true or false"; exit 1 ;;
          esac

          GAME_TYPE="${INPUT_GAME_TYPE:-regular}"
          if [[ -z "$GAME_TYPE" ]]; then
            GAME_TYPE="regular"
          fi
          case "$GAME_TYPE" in
            regular|conf_tournament|ncaa_r1|ncaa_r2) ;;
            *) echo "[ERROR] invalid game_type '$GAME_TYPE'"; exit 1 ;;
          esac

          echo "[INFO] Resolved update inputs: event=$EVENT_NAME days_back=$DAYS_BACK run_rankings=$RUN_RANKINGS game_type=$GAME_TYPE commit_data=$COMMIT_DATA"
          echo "days_back=$DAYS_BACK" >> "$GITHUB_OUTPUT"
          echo "run_rankings=$RUN_RANKINGS" >> "$GITHUB_OUTPUT"
          echo "commit_data=$COMMIT_DATA" >> "$GITHUB_OUTPUT"
          echo "game_type=$GAME_TYPE" >> "$GITHUB_OUTPUT"
          echo "artifact_name=INFRA-espn-data" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f constraints.txt ]]; then
            pip install -r requirements.txt -c constraints.txt
          else
            pip install -r requirements.txt
          fi
          python -c "import pandas, numpy, requests, scipy"

      - name: Self-test pipeline contract tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile .github/scripts/run_pipeline_contract.py .github/scripts/print_data_integrity.py
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('.github/pipeline_contracts/espn_pipeline_contract.json')
          contract = json.loads(p.read_text(encoding='utf-8'))
          assert contract.get('stages'), 'Contract missing stages'
          print('[OK] contract loaded:', p)
          PY

      - name: Run dependency-aware update stages
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/run_pipeline_contract.py \
            --contract .github/pipeline_contracts/espn_pipeline_contract.json \
            --job update \
            --days-back "${{ steps.resolve_inputs.outputs.days_back }}" \
            --game-type "${{ steps.resolve_inputs.outputs.game_type }}" \
            --manifest data/update_manifest.json

      - name: Validate required core outputs
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/check_csv.sh data/games.csv 1 "game_id,game_datetime_utc"
          bash .github/scripts/check_csv.sh data/team_game_weighted.csv 1 "game_id,team_id,game_datetime_utc"
          bash .github/scripts/check_csv.sh data/team_pretournament_snapshot.csv 1 "team_id"
          bash .github/scripts/check_csv.sh data/advanced_metrics.csv 1 "event_id,team_id"
          bash .github/scripts/check_csv.sh data/predictions_joint_latest.csv 1 "game_id,pred_total,pred_margin"

      - name: Print data integrity block
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/print_data_integrity.py \
            --label update \
            --output data/update_data_integrity.json \
            data/games.csv \
            data/team_game_weighted.csv \
            data/team_pretournament_snapshot.csv

      - name: Upload update artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-espn-data
          if-no-files-found: error
          retention-days: 21
          path: |
            data/games.csv
            data/team_game_weighted.csv
            data/team_pretournament_snapshot.csv
            data/advanced_metrics.csv
            data/predictions_joint_latest.csv
            data/predictions_joint_snapshots.csv
            data/rotation_features.csv
            data/situational_features.csv
            data/luck_regression_features.csv
            data/player_availability_features.csv
            data/player_season_summary.csv
            data/team_season_summary.csv
            data/update_manifest.json
            data/update_data_integrity.json

      - name: Validate workflow health
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .github/scripts/validate_workflows.py ]]; then
            python .github/scripts/validate_workflows.py
          else
            echo "[SKIP] .github/scripts/validate_workflows.py not found"
          fi

      - name: Commit curated update outputs to main
        if: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_inputs.outputs.commit_data == 'true' && steps.resolve_inputs.outputs.run_rankings != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "[SKIP] commit_data requested but ref is ${GITHUB_REF}; only main is allowed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --ignore-missing -- \
            data/games.csv \
            data/team_game_weighted.csv \
            data/team_pretournament_snapshot.csv \
            data/advanced_metrics.csv \
            data/predictions_joint_latest.csv \
            data/predictions_joint_snapshots.csv \
            data/rotation_features.csv \
            data/situational_features.csv \
            data/luck_regression_features.csv \
            data/player_availability_features.csv \
            data/player_season_summary.csv \
            data/team_season_summary.csv

          if git diff --staged --quiet; then
            echo "[SKIP] No curated update output changes to commit"
            exit 0
          fi

          STAGED_BYTES=$(git diff --cached --name-only -z | xargs -0 -r du -cb | tail -n 1 | cut -f1)
          STAGED_BYTES=${STAGED_BYTES:-0}
          MAX_BYTES=$((50 * 1024 * 1024))
          if (( STAGED_BYTES > MAX_BYTES )); then
            echo "[ERROR] staged payload ${STAGED_BYTES} bytes exceeds ${MAX_BYTES} byte guard"
            exit 1
          fi

          git commit -m "data: update ESPN CBB artifacts [skip ci]"
          for i in 1 2 3; do
            if ! git pull --rebase origin main; then
              echo "[ERROR] rebase conflict while syncing main on attempt ${i}"
              git rebase --abort || true
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "[OK] push succeeded on attempt ${i}"
              exit 0
            fi
            echo "[WARN] push failed on attempt ${i}; retrying"
            sleep $((i * 2))
          done
          echo "[ERROR] failed to push after retries"
          exit 1

  rankings:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ needs.update.result == 'success' && needs.update.outputs.run_rankings == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f constraints.txt ]]; then
            pip install -r requirements.txt -c constraints.txt
          else
            pip install -r requirements.txt
          fi
          python -c "import pandas, numpy, requests, scipy"

      - name: Download update artifact bundle
        uses: actions/download-artifact@v4
        with:
          name: INFRA-espn-data
          path: .

      - name: Validate update manifest and ranking inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f data/update_manifest.json ]]; then
            echo "[ERROR] Missing required data/update_manifest.json from update artifact"
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path('data/update_manifest.json').read_text(encoding='utf-8'))
          stage_names = [s.get('name') for s in manifest.get('stages', [])]
          required = {'espn_pipeline'}
          missing = sorted(required - set(stage_names))
          if missing:
              raise SystemExit(f"[ERROR] update_manifest missing required stages: {missing}")
          print('[OK] update_manifest stage list:', stage_names)
          PY
          bash .github/scripts/check_csv.sh data/team_game_weighted.csv 1 "team_id,game_id,game_datetime_utc" 36
          bash .github/scripts/check_csv.sh data/team_pretournament_snapshot.csv 1 "team_id" 36

      - name: Run dependency-aware rankings stage
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/run_pipeline_contract.py \
            --contract .github/pipeline_contracts/espn_pipeline_contract.json \
            --job rankings \
            --days-back "${{ needs.update.outputs.days_back }}" \
            --game-type "${{ needs.update.outputs.game_type }}" \
            --manifest data/rankings_manifest.json

      - name: Validate rankings outputs
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/check_csv.sh data/cbb_rankings.csv 1 "team_id,rank"
          bash .github/scripts/check_csv.sh data/cbb_rankings_by_conference.csv 1

      - name: Print rankings integrity block
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/print_data_integrity.py \
            --label rankings \
            --output data/rankings_data_integrity.json \
            data/cbb_rankings.csv \
            data/cbb_rankings_by_conference.csv

      - name: Upload rankings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-rankings-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 21
          path: |
            data/cbb_rankings.csv
            data/cbb_rankings_by_conference.csv
            data/rankings_manifest.json
            data/rankings_data_integrity.json

      - name: Commit curated update+rankings outputs to main
        if: ${{ github.event_name == 'workflow_dispatch' && needs.update.outputs.commit_data == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "[SKIP] commit_data requested but ref is ${GITHUB_REF}; only main is allowed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --ignore-missing -- \
            data/games.csv \
            data/team_game_weighted.csv \
            data/team_pretournament_snapshot.csv \
            data/rotation_features.csv \
            data/situational_features.csv \
            data/luck_regression_features.csv \
            data/player_availability_features.csv \
            data/player_season_summary.csv \
            data/team_season_summary.csv \
            data/cbb_rankings.csv \
            data/cbb_rankings_by_conference.csv

          if git diff --staged --quiet; then
            echo "[SKIP] No curated output changes to commit"
            exit 0
          fi

          STAGED_BYTES=$(git diff --cached --name-only -z | xargs -0 -r du -cb | tail -n 1 | cut -f1)
          STAGED_BYTES=${STAGED_BYTES:-0}
          MAX_BYTES=$((50 * 1024 * 1024))
          if (( STAGED_BYTES > MAX_BYTES )); then
            echo "[ERROR] staged payload ${STAGED_BYTES} bytes exceeds ${MAX_BYTES} byte guard"
            exit 1
          fi

          git commit -m "data: update ESPN CBB artifacts + rankings [skip ci]"
          for i in 1 2 3; do
            if ! git pull --rebase origin main; then
              echo "[ERROR] rebase conflict while syncing main on attempt ${i}"
              git rebase --abort || true
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "[OK] push succeeded on attempt ${i}"
              exit 0
            fi
            echo "[WARN] push failed on attempt ${i}; retrying"
            sleep $((i * 2))
          done
          echo "[ERROR] failed to push after retries"
          exit 1
