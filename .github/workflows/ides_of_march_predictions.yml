name: IDES OF MARCH Predictions

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      as_of:
        description: "Optional UTC timestamp override"
        required: false
        default: ""
      mc_mode:
        description: "Monte Carlo operating mode"
        required: false
        default: "confidence_filter"
        type: choice
        options:
          - confidence_only
          - confidence_filter
          - blended
      hours_ahead:
        description: "Upcoming window horizon (hours)"
        required: false
        default: "48"
      hours_back:
        description: "Hours prior to run time to include games (upcoming and recently completed). Set to e.g. 100 to generate predictions for all games in the past 100 hours using only pre-game data for each."
        required: false
        default: "1"

concurrency:
  group: cbb-ides-pipeline
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  TZ: UTC
  PYTHONHASHSEED: "0"

jobs:
  hydrate_upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Hydrate ESPN + market artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/staging
          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "update_espn_cbb.yml" \
            --artifact-name "INFRA-espn-data" \
            --branch "main" \
            --max-runs 30 \
            --dest "data/staging" || { echo "[ERROR] Missing INFRA-espn-data"; exit 1; }

          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "market_lines.yml" \
            --artifact-name "INFRA-market-lines" \
            --branch "main" \
            --max-runs 30 \
            --dest "data/staging" || { echo "[ERROR] Missing INFRA-market-lines"; exit 1; }

          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "wagertalk_historical_odds.yml" \
            --artifact-name "INFRA-wagertalk-historical-odds" \
            --branch "main" \
            --max-runs 30 \
            --dest "data/staging" || echo "[WARN] INFRA-wagertalk-historical-odds unavailable; continuing without WagerTalk data"

      - name: Upload hydrated inputs
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-ides-hydrated-inputs
          if-no-files-found: error
          path: data/staging/**
          retention-days: 7

  integrity_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: hydrate_upstream
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, scipy, sklearn"

      - name: Download hydrated inputs
        uses: actions/download-artifact@v4
        with:
          name: INFRA-ides-hydrated-inputs
          path: data/staging

      - name: Merge hydrated inputs into data/
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          staging = Path("data/staging")
          target = Path("data")
          target.mkdir(parents=True, exist_ok=True)

          preferred = {
              "games.csv",
              "team_game_weighted.csv",
              "market_lines_latest_by_game.csv",
              "market_lines_latest.csv",
              "market_lines.csv",
              "wagertalk_historical_odds.csv",
          }
          for path in staging.rglob("*"):
              if not path.is_file():
                  continue
              if path.name not in preferred:
                  continue
              shutil.copy2(path, target / path.name)
          PY

      - name: Run IDES data integrity contract stage
        run: |
          python .github/scripts/run_pipeline_contract.py \
            --contract .github/pipeline_contracts/ides_of_march.contract.json \
            --job update \
            --days-back "3" \
            --manifest data/logs/contract_manifest_integrity.json \
            --stages ides_data_integrity

      - name: Upload integrity manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-ides-integrity
          if-no-files-found: error
          path: data/logs/contract_manifest_integrity.json
          retention-days: 14

  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: integrity_gate
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, scipy, sklearn"

      - name: Download hydrated inputs
        uses: actions/download-artifact@v4
        with:
          name: INFRA-ides-hydrated-inputs
          path: data/staging

      - name: Download backtest calibration artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/backtest_calibration
          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "ides_backtest_calibration.yml" \
            --artifact-name "INFRA-ides-backtest-calibration" \
            --branch "main" \
            --max-runs 30 \
            --dest "data/backtest_calibration" || echo "[WARN] INFRA-ides-backtest-calibration unavailable; predictions will run without pre-built calibration policy"

      - name: Merge hydrated inputs into data/
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          staging = Path("data/staging")
          target = Path("data")
          target.mkdir(parents=True, exist_ok=True)

          preferred = {
              "games.csv",
              "team_game_weighted.csv",
              "market_lines_latest_by_game.csv",
              "market_lines_latest.csv",
              "market_lines.csv",
              "wagertalk_historical_odds.csv",
          }
          for path in staging.rglob("*"):
              if not path.is_file():
                  continue
              if path.name not in preferred:
                  continue
              shutil.copy2(path, target / path.name)

          calibration_src = Path("data/backtest_calibration")
          calibration_dest = Path("data/reports")
          calibration_dest.mkdir(parents=True, exist_ok=True)
          for name in {
              "backtest_model_summary.csv",
              "backtest_edge_band_summary.csv",
              "backtest_bet_ledger.csv",
              "backtest_kelly_summary.csv",
              "backtest_calibration_policy.json",
          }:
              for path in calibration_src.rglob(name):
                  if path.is_file():
                      shutil.copy2(path, calibration_dest / name)
          PY

      - name: Refresh ESPN schedule
        continue-on-error: true
        run: |
          python espn_pipeline.py --days-back 2 --days-ahead 7 --no-build-derived-features --summary-mode team-only

      - name: Run IDES prediction contract stage
        env:
          INPUT_AS_OF: ${{ github.event.inputs.as_of || '' }}
          INPUT_MC_MODE: ${{ github.event.inputs.mc_mode || 'confidence_filter' }}
          INPUT_HOURS_AHEAD: ${{ github.event.inputs.hours_ahead || '48' }}
          INPUT_HOURS_BACK: ${{ github.event.inputs.hours_back || '1' }}
        run: |
          set -euo pipefail
          python .github/scripts/run_pipeline_contract.py \
            --contract .github/pipeline_contracts/ides_of_march.contract.json \
            --job update \
            --days-back "3" \
            --hours-ahead "${INPUT_HOURS_AHEAD}" \
            --hours-back "${INPUT_HOURS_BACK}" \
            --mc-mode "${INPUT_MC_MODE}" \
            --manifest data/logs/contract_manifest_predict.json \
            --stages ides_predict

          if [[ -n "${INPUT_AS_OF}" ]]; then
            echo "[INFO] Re-running predict with --as-of override"
            python -m ides_of_march.cli predict \
              --mc-mode "${INPUT_MC_MODE}" \
              --hours-ahead "${INPUT_HOURS_AHEAD}" \
              --hours-back "${INPUT_HOURS_BACK}" \
              --as-of "${INPUT_AS_OF}"
          fi

      - name: Validate IDES outputs
        run: |
          bash .github/scripts/check_csv.sh data/reports/game_predictions_master.csv 0 run_id,game_id,model_spread_team_a,market_spread_team_a
          bash .github/scripts/check_csv.sh data/actionable/bet_recommendations.csv 0 run_id,game_id,bet_type
          bash .github/scripts/check_csv.sh data/reports/agreement_analysis_results.csv 1 run_id,agreement_bucket,sample_size
          bash .github/scripts/check_csv.sh data/actionable/daily_card_summary.csv 1 run_id,games_on_card

      - name: Upload IDES prediction artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-ides-of-march-predictions
          if-no-files-found: error
          path: |
            data/actionable/bet_recommendations.csv
            data/actionable/watchlist_games.csv
            data/actionable/no_bet_explanations.csv
            data/actionable/daily_card_summary.csv
            data/reports/game_predictions_master.csv
            data/reports/backtest_model_summary.csv
            data/reports/backtest_edge_band_summary.csv
            data/reports/backtest_bet_ledger.csv
            data/reports/backtest_kelly_summary.csv
            data/reports/backtest_calibration_policy.json
            data/reports/agreement_analysis_results.csv
            data/plumbing/games_schedule_master.csv
            data/plumbing/team_game_boxscores.csv
            data/plumbing/player_game_boxscores.csv
            data/plumbing/team_rolling_features.csv
            data/plumbing/game_matchup_features.csv
            data/plumbing/game_totals_features.csv
            data/plumbing/game_context_adjustments.csv
            data/plumbing/situational_signals_game_level.csv
            data/plumbing/game_monte_carlo_outputs.csv
            data/contracts/csv_contract_registry.csv
            data/contracts/schema_rules.json
            data/logs/pipeline_run_log.csv
            data/logs/run_manifest.json
            data/logs/contract_manifest_predict.json
          retention-days: 30
