name: DAG Orchestrator Weekly

on:
  schedule:
    - cron: "30 10 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchestrator-weekly:
    runs-on: ubuntu-latest
    env:
      RUN_ID: weekly_${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator (weekly profile)
        run: python -m model_lab.orchestrator run --run-id "$RUN_ID" --profile weekly --limit 200

      - name: Upload orchestrator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-weekly-${{ github.run_id }}
          path: |
            data/model_lab_runs/weekly_${{ github.run_id }}/**
            docs/audit/**
          if-no-files-found: warn
