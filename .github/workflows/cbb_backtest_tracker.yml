name: CBB Backtest Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * *"

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  backtest-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build run id
        id: run_meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          ts=$(date -u +"%Y%m%dT%H%M%SZ")
          run_id="${ts}-${short_sha}"
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          echo "RUN_ID=$run_id" >> $GITHUB_ENV

      - name: Ensure data directories exist
        run: |
          mkdir -p data
          mkdir -p artifacts/${RUN_ID}

      - name: Get latest ESPN data run ID
        id: get_espn_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=update_espn_cbb.yml \
            --status=success \
            --limit=5 \
            --json=databaseId \
            --jq='.[].databaseId' | while read rid; do
              count=$(gh api \
                /repos/${{ github.repository }}/actions/runs/${rid}/artifacts \
                --jq '.artifacts[] | select(.name=="INFRA-espn-data") | .size_in_bytes' \
                2>/dev/null || echo 0)
              echo "$count $rid"
            done | sort -rn | head -1 | awk '{print $2}')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Get latest predictions run ID
        id: get_pred_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=cbb_predictions_rolling.yml \
            --status=success \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId // ""')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Get latest market-lines run ID
        id: get_market_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=market_lines.yml \
            --status=success \
            --limit=5 \
            --json=databaseId \
            --jq='.[].databaseId' | while read rid; do
              count=$(gh api \
                /repos/${{ github.repository }}/actions/runs/${rid}/artifacts \
                --jq '.artifacts[] | select(.name=="INFRA-market-lines") | .size_in_bytes' \
                2>/dev/null || echo 0)
              echo "$count $rid"
            done | sort -rn | head -1 | awk '{print $2}')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Get latest analytics run ID
        id: get_analytics_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=cbb_analytics.yml \
            --status=success \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId // ""')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Download ESPN data artifact
        if: steps.get_espn_run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: INFRA-espn-data
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_espn_run.outputs.run_id }}
        continue-on-error: true

      - name: Download predictions artifact
        if: steps.get_pred_run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: INFRA-predictions-rolling
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_pred_run.outputs.run_id }}
        continue-on-error: true

      - name: Download market-lines artifact
        if: steps.get_market_run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: INFRA-market-lines
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_market_run.outputs.run_id }}
        continue-on-error: true

      - name: Download analytics artifact
        if: steps.get_analytics_run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: INFRA-analytics-results
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_analytics_run.outputs.run_id }}
        continue-on-error: true

      - name: Verify artifacts required for governed backtest
        id: verify_artifacts
        run: |
          missing=0
          for f in \
            data/games.csv \
            data/team_game_weighted.csv \
            data/predictions_combined_latest.csv \
            data/market_lines.csv \
            data/results_log.csv; do
            if [ ! -s "$f" ]; then
              echo "[MISSING] $f"
              missing=1
            else
              echo "[OK] $f"
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger upstream workflows if artifacts are missing
        if: steps.verify_artifacts.outputs.missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[WARN] Required artifacts missing. Triggering upstream workflows..."
          gh workflow run update_espn_cbb.yml || true
          gh workflow run cbb_predictions_rolling.yml || true
          gh workflow run market_lines.yml || true
          gh workflow run cbb_analytics.yml || true
          echo "[ERROR] Backtest tracker halted because required artifacts were unavailable."
          echo "[ERROR] Re-run this workflow after upstream workflows complete."
          exit 1

      - name: Governed backtest run (integrity gate + evaluation outputs)
        run: python -m pipeline run --mode backtest

      - name: Align generated artifact folder to workflow run_id
        run: |
          latest_dir=$(ls -1 artifacts | tail -n 1)
          if [ -n "$latest_dir" ] && [ "$latest_dir" != "$RUN_ID" ] && [ -d "artifacts/$latest_dir" ]; then
            mkdir -p "artifacts/$RUN_ID"
            cp -R "artifacts/$latest_dir"/* "artifacts/$RUN_ID"/ || true
          fi

      - name: Grade predictions (legacy outputs)
        run: python build_backtest_csvs.py --section grade-only

      - name: Walk-forward validation
        run: python -m evaluation.walk_forward

      - name: Feature audit
        run: python -m evaluation.feature_audit

      - name: Update governance status
        run: python -m pipeline update-check

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-backtest-latest
          retention-days: 7
          path: artifacts/${{ env.RUN_ID }}/**

      - name: Accuracy and CLV summary
        run: |
          python -c "
          import pandas as pd
          from pathlib import Path

          s_path = Path('data/model_accuracy_summary.csv')
          if not s_path.exists():
              print('No accuracy summary yet — needs graded predictions')
              exit(0)

          s = pd.read_csv(s_path).iloc[-1]
          g = int(s.get('total_graded', 0))
          na = 'N/A'

          def fmt(val, suffix=''):
              return f'{val}{suffix}' if val not in (None, na, '') else na

          print('=' * 55)
          print(f'  ACCURACY SUMMARY   (n={g} graded predictions)')
          print('=' * 55)
          print()
          print('CLV (PRIMARY METRIC)')
          print(f'  vs Pinnacle:       '
                f'{fmt(s.get(\"clv_vs_pinnacle_mean\"), \" pts\")}  '
                f'beat {fmt(s.get(\"beat_pinnacle_pct\"), \"%\")}  '
                f'n={s.get(\"clv_vs_pinnacle_n\", 0)}')
          print(f'  vs Consensus:      '
                f'{fmt(s.get(\"clv_vs_consensus_mean\"), \" pts\")}  '
                f'beat {fmt(s.get(\"beat_consensus_pct\"), \"%\")}')
          print(f'  vs DraftKings:     '
                f'{fmt(s.get(\"clv_vs_dk_mean\"), \" pts\")}')
          print(f'  With sharp money:  '
                f'{fmt(s.get(\"clv_with_sharp_mean\"), \" pts\")}')
          print(f'  Against sharp:     '
                f'{fmt(s.get(\"clv_against_sharp_mean\"), \" pts\")}')
          trend = s.get('clv_trend_direction', 'INSUFFICIENT_DATA')
          sig = s.get('clv_trend_significant', False)
          print(f'  Trend:             {trend}  (significant={sig})')
          print()
          print('ATS (SECONDARY METRIC)')
          print(f'  Overall:           {fmt(s.get(\"ats_pct\"), \"%\")}')
          print(f'  Edge alerts only:  {fmt(s.get(\"edge_ats_pct\"), \"%\")}')
          print(f'  ROI:               {fmt(s.get(\"roi_units\"), \" units\")}')
          print(f'  Sharpe:            {fmt(s.get(\"sharpe_ratio\"))}')
          wab = s.get('weeks_above_breakeven')
          wt = s.get('weeks_total')
          if wab is not None and wt:
              print(f'  Weeks profitable:  {wab}/{wt}')
          print()
          print('MARKET SIGNALS')
          cn = s.get('market_confirmed_n', 0)
          ctn = s.get('market_contradicted_n', 0)
          print(f'  Confirmed picks:   '
                f'{fmt(s.get(\"ats_market_confirmed\"), \"%\")} ATS  '
                f'n={cn}')
          print(f'  Contradicted picks:{fmt(s.get(\"ats_market_contradicted\"), \"%\")} ATS  '
                f'n={ctn}')
          lift = s.get('market_lift_pp')
          if lift is not None:
              print(f'  Market lift:       {lift:+.1f}pp vs overall')
          print(f'  Steam games:       '
                f'{fmt(s.get(\"ats_steam_games\"), \"%\")} ATS  '
                f'n={s.get(\"steam_games_n\", 0)}')
          print(f'  RLM confirmed:     '
                f'{fmt(s.get(\"ats_rlm_confirmed\"), \"%\")} ATS  '
                f'n={s.get(\"rlm_confirmed_n\", 0)}')
          print(f'  Line freeze:       '
                f'{fmt(s.get(\"ats_line_freeze\"), \"%\")} ATS  '
                f'n={s.get(\"freeze_games_n\", 0)}')
          print('=' * 55)
          "
