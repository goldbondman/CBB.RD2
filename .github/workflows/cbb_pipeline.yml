name: CBB Pipeline

on:
  schedule:
    - cron: "0 10 1,15 * *"   # BIWEEKLY      — 10:00 UTC on 1st and 15th
    - cron: "0 10 10 4 *"     # END OF SEASON — 10:00 UTC on April 10
  workflow_dispatch:
    inputs:
      tier:
        description: "Pipeline tier to run manually"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - biweekly
          - end_of_season

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# SHARED SETUP — referenced by all three jobs via `uses` would require
# reusable workflows; instead we duplicate the 4-step bootstrap inline.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # DAILY  (09:00 UTC every day)
  # Steps: data ingest → market lines → predictions → grading → reporting
  # All steps continue-on-error; failures are logged to pipeline_step_runs.csv
  # ───────────────────────────────────────────────────────────────────────────
  daily:
    name: "Daily — ingest, predict, grade"
    if: |
      github.event.schedule == '0 9 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'daily')
    runs-on: ubuntu-latest
    env:
      DATA_DIR: ${{ secrets.DATA_DIR }}
      TZ: America/Los_Angeles

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DAILY tier
        run: |
          set +e
          mkdir -p data data/archive
          touch data/pipeline_errors.log

          # Structured step log (append-only CSV)
          STEP_LOG="data/pipeline_step_runs.csv"
          if [ ! -f "$STEP_LOG" ]; then
            echo "run_timestamp_utc,tier,step,command,status,error_message" > "$STEP_LOG"
          fi

          log_step() {
            local tier="$1" step="$2" cmd="$3" status="$4" msg="$5"
            local ts
            ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            local escaped="${msg//\"/\"\"}"
            printf '%s,%s,%s,"%s",%s,"%s"\n' \
              "$ts" "$tier" "$step" "$cmd" "$status" "$escaped" >> "$STEP_LOG"
          }

          run_step() {
            local tier="$1" step="$2"
            shift 2
            local cmd=("$@")
            echo "[INFO] $step: ${cmd[*]}"
            if "${cmd[@]}"; then
              log_step "$tier" "$step" "${cmd[*]}" "success" ""
            else
              local rc=$?
              local msg="$step exited $rc"
              echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | $tier | $msg" | tee -a data/pipeline_errors.log
              log_step "$tier" "$step" "${cmd[*]}" "failed" "$msg"
            fi
          }

          # Check SEASON_ACTIVE before running prediction step
          SEASON_ACTIVE=$(python -c "from espn_config import SEASON_ACTIVE; print('true' if SEASON_ACTIVE else 'false')" 2>/dev/null || echo "true")

          run_step "daily" "espn_pipeline"         python espn_pipeline.py
          run_step "daily" "market_lines_closing"  python -m ingestion.market_lines --mode closing

          if [ "$SEASON_ACTIVE" = "true" ]; then
            run_step "daily" "prediction_runner"   python espn_prediction_runner.py
            run_step "daily" "derived_csvs"        python build_derived_csvs.py
          else
            echo "[SKIP] espn_prediction_runner.py — SEASON_ACTIVE is False"
            log_step "daily" "prediction_runner" "python espn_prediction_runner.py" "skipped" "SEASON_ACTIVE=False"
          fi

          run_step "daily" "results_tracker"       python cbb_results_tracker.py
          run_step "daily" "grade_predictions"     python -m evaluation.predictions_graded
          run_step "daily" "accuracy_report"       python cbb_accuracy_report.py
          run_step "daily" "season_summaries"      python cbb_season_summaries.py

      - name: Upload daily logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-daily-logs-${{ github.run_id }}
          retention-days: 30
          path: |
            data/pipeline_errors.log
            data/pipeline_step_runs.csv

  # ───────────────────────────────────────────────────────────────────────────
  # BIWEEKLY LEARNING  (10:00 UTC on 1st and 15th)
  # Gate: >= 200 graded games since last weight deployment
  # Steps: grid search → walk-forward validation → deploy/reject → report
  # Hard-fails on any step (no continue-on-error) — weight changes need to
  # succeed fully or not at all.
  # ───────────────────────────────────────────────────────────────────────────
  biweekly_learning:
    name: "Biweekly — grid search and weight update"
    if: |
      github.event.schedule == '0 10 1,15 * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'biweekly')
    runs-on: ubuntu-latest
    env:
      DATA_DIR: ${{ secrets.DATA_DIR }}
      TZ: America/Los_Angeles

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Season active gate
        id: season_gate
        run: |
          python - <<'PY'
          import os, sys
          from espn_config import SEASON_ACTIVE
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"season_active={'true' if SEASON_ACTIVE else 'false'}\n")
          if not SEASON_ACTIVE:
              print("[SKIP] Biweekly learning paused — SEASON_ACTIVE is False")
          PY

      - name: Graded-games gate (>= 200 since last weight update)
        id: games_gate
        if: steps.season_gate.outputs.season_active == 'true'
        run: |
          python - <<'PY'
          import json, os, sys
          import pandas as pd
          from pathlib import Path

          predictions_path = Path("data/predictions_graded.csv")
          weights_path     = Path("data/active_weights.json")

          if not predictions_path.exists():
              print("[SKIP] predictions_graded.csv not found")
              sys.exit(1)

          try:
              last = json.loads(weights_path.read_text()).get("deployed_at", "2000-01-01")
          except Exception:
              last = "2000-01-01"

          df = pd.read_csv(predictions_path)
          df["graded_bool"] = df.get("graded", pd.Series(dtype=str)).astype(str).str.lower().isin(["true","1","yes"])
          df["game_datetime_utc"] = pd.to_datetime(df["game_datetime_utc"], utc=True, errors="coerce")
          cutoff = pd.to_datetime(last, utc=True, errors="coerce")

          n = int(((df["graded_bool"]) & (df["game_datetime_utc"] > cutoff)).sum())
          print(f"Graded games since last weight update: {n}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"graded_count={n}\n")
              fh.write(f"gate_passed={'true' if n >= 200 else 'false'}\n")

          if n < 200:
              print(f"[SKIP] Only {n} graded games — need 200. Exiting without weight update.")
              sys.exit(1)
          PY

      - name: Grid search — optimize_weights.py
        if: steps.games_gate.outputs.gate_passed == 'true'
        run: python optimize_weights.py --min-games 200

      - name: Walk-forward validation
        if: steps.games_gate.outputs.gate_passed == 'true'
        run: python cbb_walk_forward.py --validate-candidate data/candidate_weights.json

      - name: Deploy or reject candidate weights
        if: steps.games_gate.outputs.gate_passed == 'true'
        run: python weight_deployer.py

      - name: Summarize weight deployment
        if: always()
        run: |
          echo "## Weight Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/active_weights.json ]; then
            echo "### Active weights deployed" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/active_weights.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_No active_weights.json found — deployment may have been rejected._" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f data/walk_forward_validation.json ]; then
            echo "### Walk-forward validation result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/walk_forward_validation.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Re-run accuracy report with updated weights
        if: steps.games_gate.outputs.gate_passed == 'true'
        run: python cbb_accuracy_report.py

      - name: Upload biweekly learning artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-biweekly-logs-${{ github.run_id }}
          retention-days: 90
          name: cbb-biweekly-weights
          path: |
            data/active_weights.json
            data/candidate_weights.json
            data/walk_forward_validation.json
            data/weight_gate_audit.csv
            data/weight_history/
          retention-days: 90

      - name: Commit biweekly model weights
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/walk_forward_validation.json || true
          git add data/weight_gate_audit.csv        || true
          git add data/active_weights.json          || true
          git add data/weight_history/              || true

          git add --ignore-missing \
            data/active_weights.json \
            data/candidate_weights.json \
            data/backtest_optimized_weights.json \
            data/model_weights.json \
            data/walk_forward_validation.json

          if git diff --staged --quiet; then
            echo "[SKIP] No weight changes to commit"
            exit 0
          fi

          git commit -m "chore: deploy updated model weights [biweekly] [skip ci]"

          for i in 1 2 3; do
            if git push; then
              echo "[OK] Push succeeded on attempt ${i}"
              exit 0
            fi

            echo "[WARN] Push failed on attempt ${i}; rebasing and retrying"
            git pull --rebase
            sleep $((i * 2))
          done

          echo "[ERROR] Failed to push after 3 attempts"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # END OF SEASON  (10:00 UTC on April 10 — also manually triggerable)
  # Steps: full walk-forward → full-season grid search → validate → force-deploy
  #        → archive results log
  # No gates — if you're running this you mean it.
  # ───────────────────────────────────────────────────────────────────────────
  end_of_season:
    name: "End of season — full retrain and archive"
    if: |
      github.event.schedule == '0 10 10 4 *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'end_of_season')
    runs-on: ubuntu-latest
    env:
      DATA_DIR: ${{ secrets.DATA_DIR }}
      TZ: America/Los_Angeles

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full walk-forward baseline
        run: python cbb_walk_forward.py

      - name: Full-season grid search
        run: python optimize_weights.py --full-season

      - name: Walk-forward validation of candidate weights
        run: python cbb_walk_forward.py --validate-candidate data/candidate_weights.json

      - name: Force-deploy end-of-season weights
        run: python weight_deployer.py --force

      - name: Archive results log
        run: |
          mkdir -p data/archive
          YEAR=$(date -u +"%Y")
          if [ -f data/results_log.csv ]; then
            cp data/results_log.csv "data/archive/results_log_${YEAR}.csv"
            echo "[OK] Archived results_log.csv → data/archive/results_log_${YEAR}.csv"
          else
            echo "[WARN] data/results_log.csv not found — archive step skipped"
          fi

      - name: Upload end-of-season artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-end-of-season-${{ github.run_id }}
          retention-days: 365
          path: |
            data/pipeline_errors.log
            data/pipeline_step_runs.csv
            data/active_weights.json
            data/weight_history/
            data/archive/results_log_*.csv
            data/walk_forward_results.csv
            data/walk_forward_validation.json

      - name: Commit end-of-season model weights
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --ignore-missing \
            data/active_weights.json \
            data/candidate_weights.json \
            data/backtest_optimized_weights.json \
            data/model_weights.json \
            data/walk_forward_validation.json

          if git diff --staged --quiet; then
            echo "[SKIP] No weight changes to commit"
            exit 0
          fi

          git commit -m "chore: deploy end-of-season model weights [skip ci]"

          for i in 1 2 3; do
            if git push; then
              echo "[OK] Push succeeded on attempt ${i}"
              exit 0
            fi

            echo "[WARN] Push failed on attempt ${i}; rebasing and retrying"
            git pull --rebase
            sleep $((i * 2))
          done

          echo "[ERROR] Failed to push after 3 attempts"
          exit 1
