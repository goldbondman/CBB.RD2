name: CBB Perplexity Models

on:
  schedule:
    # 14:00 UTC ~= 6:00 AM PST (America/Los_Angeles) outside DST.
    # During PDT this runs at 7:00 AM local.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      hours_back:
        description: "Hours back from now to include games (upcoming and recently completed). E.g. 100 generates picks for all games in the past 100 hours using only pre-game data for each."
        required: false
        default: "24"
      hours_ahead:
        description: "How many hours ahead from now to include (manual runs)"
        required: false
        default: "48"
      run_mode:
        description: "Execution mode label"
        required: false
        default: "daily"

concurrency:
  group: cbb-perplexity-pipeline
  cancel-in-progress: true

permissions:
  contents: write

env:
  TZ: UTC
  PYTHONHASHSEED: "0"
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

jobs:
  perplexity_models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: resolve_inputs
        shell: bash
        env:
          INPUT_HOURS_BACK: ${{ github.event.inputs.hours_back }}
          INPUT_HOURS_AHEAD: ${{ github.event.inputs.hours_ahead }}
          INPUT_DAYS_BACK: ${{ github.event.inputs.days_back }}
          INPUT_RUN_MODE: ${{ github.event.inputs.run_mode }}
        run: |
          set -euo pipefail
          RUN_MODE="${INPUT_RUN_MODE:-daily}"
          EVENT_NAME="${GITHUB_EVENT_NAME:-}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            HOURS_BACK="${INPUT_HOURS_BACK:-24}"
            HOURS_AHEAD="${INPUT_HOURS_AHEAD:-30}"
            # Backward compatibility for callers still sending days_back programmatically.
            if [[ -z "${INPUT_HOURS_BACK:-}" && -n "${INPUT_DAYS_BACK:-}" && "${INPUT_DAYS_BACK}" =~ ^[0-9]+$ ]]; then
              HOURS_BACK="$(( INPUT_DAYS_BACK * 24 ))"
            fi
          else
            # 72h back / 120h ahead covers full March Madness scheduling window (games posted 4-5 days out).
            HOURS_BACK="72"
            HOURS_AHEAD="120"
          fi

          if ! [[ "$HOURS_BACK" =~ ^[0-9]+$ ]]; then
            echo "[ERROR] hours_back must be numeric; got '$HOURS_BACK'"
            exit 1
          fi
          if ! [[ "$HOURS_AHEAD" =~ ^[0-9]+$ ]]; then
            echo "[ERROR] hours_ahead must be numeric; got '$HOURS_AHEAD'"
            exit 1
          fi
          if (( HOURS_BACK < 0 )); then
            echo "[ERROR] hours_back must be >= 0"
            exit 1
          fi
          if (( HOURS_AHEAD < 1 )); then
            echo "[ERROR] hours_ahead must be >= 1"
            exit 1
          fi
          # Contract runner still uses days_back. Derive from hours_back with a +1 day buffer so
          # today's PST window is not dropped at UTC date boundaries.
          DAYS_BACK=$(( (HOURS_BACK + 23) / 24 + 1 ))
          if (( DAYS_BACK < 1 )); then DAYS_BACK=1; fi

          mapfile -t _window_vals < <(HOURS_BACK="$HOURS_BACK" HOURS_AHEAD="$HOURS_AHEAD" python - <<'PY'
          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo
          import os
          hb = int(os.environ["HOURS_BACK"])
          ha = int(os.environ["HOURS_AHEAD"])
          now_utc = datetime.now(timezone.utc)
          now_pst = now_utc.astimezone(ZoneInfo("America/Los_Angeles"))
          print(now_utc.isoformat())
          print(now_pst.isoformat())
          print((now_utc - timedelta(hours=hb)).isoformat())
          print((now_utc + timedelta(hours=ha)).isoformat())
          PY
          )
          NOW_UTC="${_window_vals[0]}"
          NOW_PST="${_window_vals[1]}"
          WINDOW_START_UTC="${_window_vals[2]}"
          WINDOW_END_UTC="${_window_vals[3]}"

          echo "hours_back=$HOURS_BACK" >> "$GITHUB_OUTPUT"
          echo "hours_ahead=$HOURS_AHEAD" >> "$GITHUB_OUTPUT"
          echo "days_back=$DAYS_BACK" >> "$GITHUB_OUTPUT"
          echo "now_utc=$NOW_UTC" >> "$GITHUB_OUTPUT"
          echo "now_pst=$NOW_PST" >> "$GITHUB_OUTPUT"
          echo "window_start_utc=$WINDOW_START_UTC" >> "$GITHUB_OUTPUT"
          echo "window_end_utc=$WINDOW_END_UTC" >> "$GITHUB_OUTPUT"
          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"
          echo "[INFO] run_mode=$RUN_MODE hours_back=$HOURS_BACK hours_ahead=$HOURS_AHEAD derived_days_back=$DAYS_BACK"
          echo "[INFO] now_pst=$NOW_PST now_utc=$NOW_UTC"
          echo "[INFO] window_utc=[${WINDOW_START_UTC} -> ${WINDOW_END_UTC}]"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (with import guard)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f constraints.txt ]]; then
            pip install -r requirements.txt -c constraints.txt
          else
            pip install -r requirements.txt
          fi
          python - <<'PY'
          import pandas, numpy, requests, scipy  # noqa: F401
          print("[OK] dependency import guard passed")
          PY

      - name: Preflight contract runner bounds
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          DAYS_BACK="${{ steps.resolve_inputs.outputs.days_back }}"
          HOURS_BACK="${{ steps.resolve_inputs.outputs.hours_back }}"
          HOURS_AHEAD="${{ steps.resolve_inputs.outputs.hours_ahead }}"
          MAX_DAYS_BACK=14
          ALLOW_RUN="true"
          REASON=""
          if (( DAYS_BACK > MAX_DAYS_BACK )); then
            ALLOW_RUN="false"
            REASON="derived days_back=${DAYS_BACK} (from hours_back=${HOURS_BACK}, hours_ahead=${HOURS_AHEAD}) exceeds safe cap ${MAX_DAYS_BACK}; use update_espn_cbb for larger backfills."
          fi
          echo "[INFO] preflight allow_run=${ALLOW_RUN} reason='${REASON}'"
          echo "allow_run=${ALLOW_RUN}" >> "$GITHUB_OUTPUT"
          {
            echo "reason<<EOF"
            echo "${REASON}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download ESPN artifact for perplexity (Tier A)
        id: download_espn_for_perplexity
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "update_espn_cbb.yml" \
            --artifact-name "INFRA-espn-data" \
            --branch "main" \
            --max-runs 20 \
            --dest "data"

      - name: Hydrate predictions and market artifacts (manual run safety)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "cbb_predictions_rolling.yml" \
            --artifact-name "INFRA-predictions-rolling" \
            --branch "main" \
            --max-runs 20 \
            --dest "data" || echo "[WARN] No INFRA-predictions-rolling found"

          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "market_lines.yml" \
            --artifact-name "INFRA-market-lines" \
            --branch "main" \
            --max-runs 20 \
            --dest "data" || echo "[WARN] No INFRA-market-lines found"

      - name: Run dependency-aware perplexity stages via contract runner
        id: contract_runner
        if: ${{ steps.preflight.outputs.allow_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          LOG_PATH="data/perplexity_contract_runner.log"
          STAGES="espn_pipeline,rotation_features,situational_features,market_builder,advanced_metrics_builder,joint_models_predictions"
          # On manual (workflow_dispatch) runs always re-run espn_pipeline so today's upcoming
          # games are fetched fresh. Skipping is only safe for scheduled runs where the artifact
          # was just produced moments ago by the upstream update_espn_cbb workflow.
          if [[ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]]; then
            if [[ -f data/team_game_weighted.csv ]]; then
              ROWS=$(python -c "import pandas as pd; print(len(pd.read_csv('data/team_game_weighted.csv')))" 2>/dev/null || echo 0)
              # Require >50 rows to confirm ESPN data is substantive, not a stale/empty artifact
              if (( ROWS > 50 )); then
                echo "[INFO] ESPN artifact present with $ROWS rows; skipping espn_pipeline stage"
                STAGES="rotation_features,situational_features,market_builder,advanced_metrics_builder,joint_models_predictions"
              fi
            fi
          else
            echo "[INFO] workflow_dispatch: always running espn_pipeline to ensure today's games are fetched fresh"
          fi
          set +e
          python .github/scripts/run_pipeline_contract.py \
            --contract .github/pipeline_contracts/espn_pipeline_contract.json \
            --job update \
            --days-back "${{ steps.resolve_inputs.outputs.days_back }}" \
            --manifest data/perplexity_models_manifest.json \
            --stages "${STAGES}" \
            2>&1 | tee "${LOG_PATH}"
          CONTRACT_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${CONTRACT_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "[INFO] contract_runner_exit_code=${CONTRACT_EXIT_CODE}"

      - name: Freshness and market-coverage hard gate
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        env:
          NOW_UTC: ${{ steps.resolve_inputs.outputs.now_utc }}
          WINDOW_END_UTC: ${{ steps.resolve_inputs.outputs.window_end_utc }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          import pandas as pd

          MAX_PRED_AGE_HOURS = 30.0
          MAX_LINES_AGE_HOURS = 30.0
          HORIZON_BUFFER_HOURS = 2.0
          COVERAGE_MIN = 0.90

          def parse_iso(raw: str) -> datetime:
              if not raw:
                  raise ValueError("empty timestamp")
              normalized = raw.replace("Z", "+00:00")
              dt = datetime.fromisoformat(normalized)
              if dt.tzinfo is None:
                  dt = dt.replace(tzinfo=timezone.utc)
              return dt.astimezone(timezone.utc)

          def latest_ts(df: pd.DataFrame, cols: list[str]) -> datetime | None:
              for col in cols:
                  if col in df.columns:
                      series = pd.to_datetime(df[col], errors="coerce", utc=True)
                      if series.notna().any():
                          return series.max().to_pydatetime()
              return None

          now_utc = parse_iso(os.environ["NOW_UTC"])
          window_end_utc = parse_iso(os.environ["WINDOW_END_UTC"])
          horizon_min = window_end_utc - timedelta(hours=HORIZON_BUFFER_HOURS)

          paths = {
              "games": Path("data/games.csv"),
              "lines": Path("data/market_lines_latest_by_game.csv"),
              "preds": Path("data/predictions_joint_latest.csv"),
          }
          for name, path in paths.items():
              if not path.exists():
                  raise SystemExit(f"[STOP] freshness gate: missing required file {path} ({name})")

          games = pd.read_csv(paths["games"], low_memory=False)
          lines = pd.read_csv(paths["lines"], low_memory=False)
          preds = pd.read_csv(paths["preds"], low_memory=False)

          if games.empty:
              raise SystemExit("[STOP] freshness gate: games.csv is empty")
          if lines.empty:
              raise SystemExit("[STOP] freshness gate: market_lines_latest_by_game.csv is empty")
          if preds.empty:
              raise SystemExit("[STOP] freshness gate: predictions_joint_latest.csv is empty")

          pred_generated_at = latest_ts(preds, ["generated_at_utc", "created_at_utc", "updated_at_utc"])
          if pred_generated_at is None:
              raise SystemExit("[STOP] freshness gate: predictions file missing generated timestamp column")
          pred_age_h = (now_utc - pred_generated_at).total_seconds() / 3600.0
          if pred_age_h > MAX_PRED_AGE_HOURS:
              raise SystemExit(
                  f"[STOP] freshness gate: predictions stale ({pred_age_h:.1f}h > {MAX_PRED_AGE_HOURS:.1f}h)"
              )

          lines_updated_at = latest_ts(lines, ["line_timestamp_utc", "captured_at_utc", "updated_at_utc"])
          if lines_updated_at is None:
              raise SystemExit("[STOP] freshness gate: market lines file missing timestamp column")
          lines_age_h = (now_utc - lines_updated_at).total_seconds() / 3600.0
          if lines_age_h > MAX_LINES_AGE_HOURS:
              raise SystemExit(
                  f"[STOP] freshness gate: market lines stale ({lines_age_h:.1f}h > {MAX_LINES_AGE_HOURS:.1f}h)"
              )

          games_horizon = latest_ts(games, ["game_datetime_utc", "game_date", "date"])
          preds_horizon = latest_ts(preds, ["game_datetime_utc", "game_date", "date"])
          lines_horizon = latest_ts(lines, ["game_datetime_utc", "game_date", "date"])
          if games_horizon is None or preds_horizon is None or lines_horizon is None:
              raise SystemExit("[STOP] freshness gate: unable to compute horizon coverage timestamps")
          if games_horizon < horizon_min:
              raise SystemExit("[STOP] freshness gate: games horizon does not reach requested window")
          if preds_horizon < horizon_min:
              raise SystemExit("[STOP] freshness gate: prediction horizon does not reach requested window")
          if lines_horizon < horizon_min:
              raise SystemExit("[STOP] freshness gate: market-lines horizon does not reach requested window")

          if "game_datetime_utc" not in preds.columns:
              raise SystemExit("[STOP] freshness gate: predictions missing game_datetime_utc")
          if "game_datetime_utc" not in lines.columns:
              raise SystemExit("[STOP] freshness gate: market lines missing game_datetime_utc")

          pred_window = preds.copy()
          pred_window["game_datetime_utc"] = pd.to_datetime(pred_window["game_datetime_utc"], errors="coerce", utc=True)
          pred_window = pred_window[
              pred_window["game_datetime_utc"].notna()
              & (pred_window["game_datetime_utc"] >= now_utc)
              & (pred_window["game_datetime_utc"] <= window_end_utc)
          ].copy()
          if pred_window.empty:
              print("[WARN] freshness gate: no upcoming predictions inside requested window — no games scheduled in this window, continuing")
              import sys; sys.exit(0)

          lines_window = lines.copy()
          lines_window["game_datetime_utc"] = pd.to_datetime(lines_window["game_datetime_utc"], errors="coerce", utc=True)
          lines_window = lines_window[
              lines_window["game_datetime_utc"].notna()
              & (lines_window["game_datetime_utc"] >= now_utc)
              & (lines_window["game_datetime_utc"] <= window_end_utc)
          ].copy()

          has_spread = pd.Series(False, index=lines_window.index)
          has_total = pd.Series(False, index=lines_window.index)
          if "closing_spread" in lines_window.columns:
              has_spread = has_spread | lines_window["closing_spread"].notna()
          if "spread_line" in lines_window.columns:
              has_spread = has_spread | lines_window["spread_line"].notna()
          if "closing_total" in lines_window.columns:
              has_total = has_total | lines_window["closing_total"].notna()
          if "total_line" in lines_window.columns:
              has_total = has_total | lines_window["total_line"].notna()
          lines_window = lines_window[has_spread | has_total].copy()

          if "event_id" in pred_window.columns and "event_id" in lines_window.columns:
              pred_ids = set(pd.to_numeric(pred_window["event_id"], errors="coerce").dropna().astype("int64").tolist())
              line_ids = set(pd.to_numeric(lines_window["event_id"], errors="coerce").dropna().astype("int64").tolist())
          elif "game_id" in pred_window.columns and "game_id" in lines_window.columns:
              pred_ids = set(pd.to_numeric(pred_window["game_id"], errors="coerce").dropna().astype("int64").tolist())
              line_ids = set(pd.to_numeric(lines_window["game_id"], errors="coerce").dropna().astype("int64").tolist())
          else:
              raise SystemExit("[STOP] freshness gate: no common key (event_id/game_id) for coverage check")

          if not pred_ids:
              raise SystemExit("[STOP] freshness gate: no valid prediction IDs in upcoming window")
          matched = pred_ids & line_ids
          coverage = len(matched) / len(pred_ids)
          required_coverage = COVERAGE_MIN
          if coverage < required_coverage:
              raise SystemExit(
                  "[STOP] freshness gate: market-line coverage too low "
                  f"({coverage:.1%} < {required_coverage:.1%}; matched={len(matched)} of {len(pred_ids)})"
              )

          report = {
              "now_utc": now_utc.isoformat(),
              "window_end_utc": window_end_utc.isoformat(),
              "pred_generated_at_utc": pred_generated_at.isoformat(),
              "pred_age_hours": round(pred_age_h, 3),
              "lines_updated_at_utc": lines_updated_at.isoformat(),
              "lines_age_hours": round(lines_age_h, 3),
              "games_horizon_utc": games_horizon.isoformat(),
              "pred_horizon_utc": preds_horizon.isoformat(),
              "lines_horizon_utc": lines_horizon.isoformat(),
              "upcoming_predictions": len(pred_ids),
              "upcoming_lines_with_market_data": len(line_ids),
              "upcoming_coverage": coverage,
              "required_coverage": required_coverage,
          }
          Path("debug").mkdir(parents=True, exist_ok=True)
          Path("debug/perplexity_freshness_gate.json").write_text(json.dumps(report, indent=2), encoding="utf-8")
          print(
              "[OK] freshness gate passed "
              f"(pred_age={pred_age_h:.1f}h, line_age={lines_age_h:.1f}h, coverage={coverage:.1%})"
          )
          PY

      - name: Pre-upload diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "[DIAG] pwd"
          pwd
          echo "[DIAG] ls -la"
          ls -la
          echo "[DIAG] ls -la data/"
          ls -la data/ || true
          echo "[DIAG] find data candidate files"
          find data -maxdepth 2 -type f \( -name "*advanced*" -o -name "*predictions*joint*" -o -name "*snapshots*" -o -name "games.csv" -o -name "market_lines*" \) -print || true
          echo "[DIAG] find repo candidate files"
          find . -maxdepth 4 -type f \( -name "*advanced*" -o -name "*predictions*joint*" -o -name "*snapshots*" -o -name "games.csv" -o -name "market_lines*" \) -print | sort || true
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          expected = [
              Path("data/games.csv"),
              Path("data/market_lines.csv"),
              Path("data/market_lines_latest.csv"),
              Path("data/market_lines_canonical.csv"),
              Path("data/market_lines_latest_by_book.csv"),
              Path("data/advanced_metrics.csv"),
              Path("data/team_snapshot.csv"),
              Path("data/market_lines_latest_by_game.csv"),
              Path("data/predictions_joint_latest.csv"),
              Path("data/predictions_joint_snapshots.csv"),
          ]
          for path in expected:
              if not path.exists():
                  print(f"[DIAG] missing {path}")
                  continue
              if path.stat().st_size == 0:
                  print(f"[DIAG] empty-file {path.resolve()} size=0")
                  continue
              try:
                  df = pd.read_csv(path, dtype=str, low_memory=False)
                  print(f"[DIAG] file={path.resolve()} rows={len(df)} cols={len(df.columns)}")
              except Exception as exc:
                  print(f"[DIAG] unreadable-csv {path.resolve()} error={exc}")
          PY

      - name: Write run manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/write_run_manifest.py \
            --output data/run_manifest.json \
            --contract-manifest data/perplexity_models_manifest.json \
            --contract-log data/perplexity_contract_runner.log \
            --days-back "${{ steps.resolve_inputs.outputs.days_back }}" \
            --run-mode "${{ steps.resolve_inputs.outputs.run_mode }}" \
            --preflight-allow "${{ steps.preflight.outputs.allow_run }}" \
            --preflight-reason "${{ steps.preflight.outputs.reason }}" \
            --contract-exit-code "${{ steps.contract_runner.outputs.exit_code }}" \
            --files data/games.csv data/market_lines.csv data/market_lines_latest.csv data/market_lines_canonical.csv data/market_lines_latest_by_book.csv data/market_lines_latest_by_game.csv data/advanced_metrics.csv data/team_snapshot.csv data/predictions_joint_latest.csv data/predictions_joint_snapshots.csv

      - name: Validate required outputs
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/check_csv.sh data/games.csv 1 "game_id,game_datetime_utc"
          bash .github/scripts/check_csv.sh data/market_lines_canonical.csv 0 "event_id,spread_line,total_line,source"
          bash .github/scripts/check_csv.sh data/market_lines_latest_by_book.csv 0 "event_id,book,spread_line,total_line"
          bash .github/scripts/check_csv.sh data/market_lines_latest_by_game.csv 0 "event_id,spread_line,total_line,line_source_used"
          bash .github/scripts/validate_perplexity_outputs.sh data/perplexity_contract_runner.log
          python .github/scripts/validate_joint_predictions.py \
            --input data/predictions_joint_latest.csv \
            --debug-json debug/pred_margin_validation.json

      - name: Compute L6/L11 core metrics
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/internal models
          python scripts/compute_core_metrics.py 2>&1 | tee data/internal/metrics_build_log.txt
          echo "[OK] core metrics written"

      - name: Build matchup features
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_matchup_features.py --hours-back "${{ steps.resolve_inputs.outputs.hours_back }}"
          echo "[OK] matchup features written"

      - name: Train models
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/train_models.py
          echo "[OK] models trained"

      - name: Generate picks
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_picks.py
          echo "[OK] picks generated"

      - name: Validate picks output
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          python - <<'PY'
          import pandas as pd, sys
          df = pd.read_csv("data/cbb_picks_today.csv")
          required = ['game_date','away_team','home_team','vegas_spread','vegas_total',
                      'vegas_pred_win','model_predicted_margin','model_predicted_total','model_pick','spread_edge',
                      'spread_conf','spread_prob','total_pick','total_edge','total_conf',
                      'total_prob','key_signal','trend_flag','total_key_signal']
          missing = [c for c in required if c not in df.columns]
          if missing:
              print(f"[ERROR] Missing cols: {missing}"); sys.exit(1)
          high = df[df['spread_conf']=='HIGH']
          print(f"[OK] {len(df)} picks | {len(high)} HIGH confidence")
          print(df[['away_team','home_team','model_pick','spread_conf',
                     'key_signal','trend_flag','total_key_signal']].to_string(index=False))
          PY

      - name: Generate trend picks
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_trend_picks.py
          echo "[OK] trend picks generated"

      - name: Generate 30-hour prediction report
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_prediction_report.py
          echo "[OK] 30-hour prediction report generated"

      - name: CAGE ATS backtest
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/backtest_cage_ats.py
          echo "[OK] CAGE ATS backtest written"

      - name: Signal alignment backtest (Model + CAGE + Trend)
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/backtest_alignment.py
          echo "[OK] Alignment backtest written"

      - name: Kelly unit backtest
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/backtest_kelly.py
          echo "[OK] Kelly backtest written"

      - name: Guard required outputs, oversize files, and build artifact payload
        if: always()
        shell: bash
        env:
          PREFLIGHT_ALLOW: ${{ steps.preflight.outputs.allow_run }}
          CONTRACT_EXIT: ${{ steps.contract_runner.outputs.exit_code }}
        run: |
          set -euo pipefail
          mkdir -p debug debug/artifact_payload
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path
          import pandas as pd
          import os

          preflight_allow = os.environ.get("PREFLIGHT_ALLOW", "")
          contract_exit = os.environ.get("CONTRACT_EXIT", "")
          enforce_required = (preflight_allow == "true" and contract_exit == "0")

          required_files = [
              Path("data/games.csv"),
              Path("data/market_lines_canonical.csv"),
              Path("data/market_lines_latest_by_book.csv"),
              Path("data/advanced_metrics.csv"),
              Path("data/team_snapshot.csv"),
              Path("data/market_lines_latest_by_game.csv"),
              Path("data/predictions_joint_latest.csv"),
              Path("data/predictions_joint_snapshots.csv"),
          ]
          max_size_bytes = 500 * 1024 * 1024
          raw_upload_max_bytes = 100 * 1024 * 1024
          oversize = []
          missing_required = []
          stats = {}
          payload_dir = Path("debug/artifact_payload")
          payload_dir.mkdir(parents=True, exist_ok=True)

          for path in required_files:
              entry = {"exists": path.exists(), "size_bytes": 0, "rows": None}
              if path.exists():
                  entry["size_bytes"] = int(path.stat().st_size)
                  if entry["size_bytes"] > max_size_bytes:
                      oversize.append({"path": str(path), "size_bytes": entry["size_bytes"], "max_size_bytes": max_size_bytes})
                  if path.suffix.lower() == ".csv" and entry["size_bytes"] > 0:
                      try:
                          df = pd.read_csv(path, dtype=str, low_memory=False)
                          entry["rows"] = int(len(df))
                          sample = df.head(500)
                          sample_path = Path("debug") / f"sample_{path.name}"
                          sample.to_csv(sample_path, index=False)
                      except Exception as exc:
                          entry["read_error"] = str(exc)
                  if entry["size_bytes"] <= raw_upload_max_bytes:
                      shutil.copy2(path, payload_dir / path.name)
              if enforce_required and (not path.exists() or path.stat().st_size == 0):
                  missing_required.append(str(path))
              stats[str(path)] = entry

          Path("debug/output_file_stats.json").write_text(json.dumps(stats, indent=2), encoding="utf-8")

          artifact_manifest = {
              "enforce_required": enforce_required,
              "oversize_count": len(oversize),
              "missing_required_count": len(missing_required),
              "required_files": [str(p) for p in required_files],
              "raw_upload_max_bytes": raw_upload_max_bytes,
          }
          Path("debug/artifact_upload_manifest.json").write_text(json.dumps(artifact_manifest, indent=2), encoding="utf-8")

          if oversize:
              Path("debug/oversize_outputs.json").write_text(json.dumps(oversize, indent=2), encoding="utf-8")
              print("[ERROR] Oversize output files detected (>500MB). See debug/oversize_outputs.json")
              raise SystemExit(1)

          if missing_required:
              print("[ERROR] Missing required outputs:")
              for item in missing_required:
                  print(f"  - {item}")
              print("Action: inspect data/run_manifest.json and data/perplexity_contract_runner.log for failing stage.")
              raise SystemExit(1)
          PY

      - name: Health summary
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          files = [
              Path("data/games.csv"),
              Path("data/market_lines_canonical.csv"),
              Path("data/market_lines_latest_by_book.csv"),
              Path("data/advanced_metrics.csv"),
              Path("data/team_snapshot.csv"),
              Path("data/market_lines_latest_by_game.csv"),
              Path("data/predictions_joint_latest.csv"),
              Path("data/predictions_joint_snapshots.csv"),
          ]

          lines = []
          for p in files:
              df = pd.read_csv(p, low_memory=False)
              ts_col = next((c for c in ["generated_at_utc", "game_datetime_utc", "date"] if c in df.columns), None)
              latest = None
              if ts_col:
                  latest = pd.to_datetime(df[ts_col], errors="coerce", utc=True).max()
              lines.append(f"- {p}: rows={len(df)}, latest_ts={latest}")
              print(f"[HEALTH] {p} rows={len(df)} latest_ts={latest}")

          with open(Path(".").joinpath("health_summary.md"), "w", encoding="utf-8") as fh:
              fh.write("## Perplexity Models Health Summary\n")
              for line in lines:
                  fh.write(line + "\n")
          PY
          cat health_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail fast with root-cause details
        if: ${{ always() && (steps.preflight.outputs.allow_run != 'true' || steps.contract_runner.outputs.exit_code != '0') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "[ERROR] Required producer output chain did not complete."
          echo "[INFO] producer stages: espn_pipeline -> market_builder -> advanced_metrics_builder -> joint_models_predictions"
          echo "[INFO] producer command: python .github/scripts/run_pipeline_contract.py --contract .github/pipeline_contracts/espn_pipeline_contract.json --job update --days-back '${{ steps.resolve_inputs.outputs.days_back }}' --manifest data/perplexity_models_manifest.json --stages 'espn_pipeline,rotation_features,situational_features,market_builder,advanced_metrics_builder,joint_models_predictions'"
          echo "[INFO] preflight_allow_run='${{ steps.preflight.outputs.allow_run }}' reason='${{ steps.preflight.outputs.reason }}'"
          echo "[INFO] contract_runner_exit_code='${{ steps.contract_runner.outputs.exit_code }}'"
          if [[ -f data/perplexity_contract_runner.log ]]; then
            echo "[INFO] last 50 lines from data/perplexity_contract_runner.log:"
            tail -n 50 data/perplexity_contract_runner.log || true
          else
            echo "[WARN] data/perplexity_contract_runner.log not found"
          fi
          if [[ -f debug/contract_missing_outputs.json ]]; then
            echo "[INFO] contract_missing_outputs summary:"
            cat debug/contract_missing_outputs.json
          fi
          exit 1

      - name: Upload diagnostics artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-perplexity-models-diagnostics
          if-no-files-found: error
          retention-days: 21
          path: |
            data/run_manifest.json
            data/perplexity_models_manifest.json
            data/perplexity_contract_runner.log
            health_summary.md

      - name: Upload debug bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-perplexity-debug
          if-no-files-found: warn
          retention-days: 21
          path: |
            debug/

      - name: Upload model-output artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-perplexity-models
          if-no-files-found: warn
          retention-days: 21
          path: |
            debug/artifact_payload/
            debug/sample_*.csv
            debug/output_file_stats.json
            debug/artifact_upload_manifest.json
            data/games.csv
            data/market_lines.csv
            data/market_lines_latest.csv
            data/market_lines_canonical.csv
            data/market_lines_latest_by_book.csv
            data/market_lines_latest_by_game.csv
            data/internal/
            data/cbb_picks_today.csv
            data/cbb_trend_picks_today.csv
            data/cbb_pure_trend_picks_today.csv
            data/prediction_report_30h.md
            data/prediction_report_30h.csv
            data/cage_ats_backtest.md
            data/cage_ats_backtest.csv
            data/backtest_alignment.md
            data/backtest_alignment.csv
            data/backtest_kelly.md
            data/backtest_kelly.csv

      - name: Commit and push model outputs to main
        if: ${{ steps.preflight.outputs.allow_run == 'true' && steps.contract_runner.outputs.exit_code == '0' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "[SKIP] Ref is ${GITHUB_REF}; only main is allowed for direct push."
            exit 0
          fi

          mkdir -p debug
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_PATHS=(
            data/games.csv
            data/market_lines.csv
            data/market_lines_latest.csv
            data/advanced_metrics.csv
            data/team_snapshot.csv
            data/market_lines_canonical.csv
            data/market_lines_latest_by_book.csv
            data/market_lines_latest_by_game.csv
            data/predictions_joint_latest.csv
            data/predictions_joint_snapshots.csv
            data/cbb_picks_today.csv
            data/cbb_trend_picks_today.csv
            data/cbb_pure_trend_picks_today.csv
            data/prediction_report_30h.md
            data/prediction_report_30h.csv
            data/cage_ats_backtest.md
            data/cage_ats_backtest.csv
            data/backtest_alignment.md
            data/backtest_alignment.csv
            data/backtest_kelly.md
            data/backtest_kelly.csv
          )
          echo "[INFO] commit scope paths:"
          printf '  - %s\n' "${COMMIT_PATHS[@]}"

          echo "[INFO] pre-stage git status --short"
          git status --short | tee debug/pre_stage_status.txt || true

          echo "[INFO] staging target files (missing files are skipped, not an error):"
          for _f in "${COMMIT_PATHS[@]}"; do
            if [[ -e "$_f" ]]; then
              if git ls-files --error-unmatch "$_f" >/dev/null 2>&1; then
                echo "[INFO] tracked, staging: $_f"
              else
                echo "[INFO] new file, staging: $_f"
              fi
              git add -- "$_f"
            else
              echo "[SKIP] missing, not staging: $_f"
            fi
          done

          if git diff --staged --quiet; then
            echo "[SKIP] No output changes to commit"
            exit 0
          fi

          STAGED_BYTES=$(git diff --cached --name-only -z | xargs -0 -r du -cb | tail -n 1 | cut -f1)
          STAGED_BYTES=${STAGED_BYTES:-0}
          MAX_BYTES=$((50 * 1024 * 1024))
          if (( STAGED_BYTES > MAX_BYTES )); then
            echo "[ERROR] staged payload ${STAGED_BYTES} bytes exceeds ${MAX_BYTES} byte guard"
            exit 1
          fi

          git commit -m "data: refresh perplexity model outputs [skip ci]"

          echo "[INFO] post-commit status (before cleanup)"
          POST_COMMIT_STATUS=$(git status --porcelain || true)
          echo "${POST_COMMIT_STATUS}"
          POST_COMMIT_DIRTY_COUNT=$(grep -c '.' <<< "${POST_COMMIT_STATUS}" || true)
          POST_COMMIT_DIRTY_COUNT=${POST_COMMIT_DIRTY_COUNT:-0}
          echo "[INFO] post_commit_dirty_files=${POST_COMMIT_DIRTY_COUNT}"

          echo "[INFO] cleaning non-target generated changes before rebase"
          git restore --worktree --staged .
          git clean -fd

          echo "[INFO] pre-rebase status after cleanup"
          PRE_REBASE_STATUS=$(git status --porcelain || true)
          echo "${PRE_REBASE_STATUS}"
          if [[ -n "${PRE_REBASE_STATUS}" ]]; then
            echo "[ERROR] Refusing to pull/rebase with dirty worktree. Remaining files:"
            echo "${PRE_REBASE_STATUS}"
            echo "[INFO] tracked/untracked classification:"
            while IFS= read -r line; do
              [[ -z "${line}" ]] && continue
              status_code="${line:0:2}"
              file_path="${line:3}"
              file_kind="tracked"
              if [[ "${status_code}" == "??" ]]; then
                file_kind="untracked"
              fi
              echo "  - ${file_path} (${file_kind})"
            done <<< "${PRE_REBASE_STATUS}"
            exit 1
          fi

          for i in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              echo "[ERROR] rebase conflict while syncing main on attempt ${i}"
              git status --short || true
              if [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; then
                git rebase --abort || true
              fi
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "[OK] push succeeded on attempt ${i}"
              exit 0
            fi
            echo "[WARN] push failed on attempt ${i}; retrying"
            sleep $((i * 2))
          done
          echo "[ERROR] failed to push after retries"
          exit 1
