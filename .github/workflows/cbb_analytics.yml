name: CBB Analytics

on:
  schedule:
    - cron: "0 8 * * *"     # Results tracker — daily 8 AM UTC
    - cron: "0 10 * * 1"    # Backtester — weekly Monday 10 AM UTC
  workflow_run:
    workflows: ["Market Lines Capture"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "What to run"
        default: "both"
        type: choice
        options: ["tracker_only", "backtest_only", "both"]
      start_date:
        description: "Optional start date filter (YYYYMMDD)"
        required: false
        type: string
      end_date:
        description: "Optional end date filter (YYYYMMDD)"
        required: false
        type: string

# Pattern 3: Standardized concurrency group to prevent race conditions across all pipeline workflows
concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Standard checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Download all required artifacts. Standardized names used.
      # Pattern: Use gh CLI to find latest successful run-id for cross-workflow downloads
      - name: Get latest Market Lines run ID
        id: get_ml_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=market_lines.yml \
            --status=success \
            --limit=5 \
            --json=databaseId \
            --jq='.[].databaseId' | while read rid; do
              count=$(gh api \
                /repos/${{ github.repository }}/actions/runs/${rid}/artifacts \
                --jq '.artifacts[] | select(.name=="INFRA-market-lines") | .size_in_bytes' \
                2>/dev/null || echo 0)
              echo "$count $rid"
            done | sort -rn | head -1 | awk '{print $2}')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Get latest ESPN data run ID
        id: get_espn_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=update_espn_cbb.yml \
            --status=success \
            --limit=5 \
            --json=databaseId \
            --jq='.[].databaseId' | while read rid; do
              count=$(gh api \
                /repos/${{ github.repository }}/actions/runs/${rid}/artifacts \
                --jq '.artifacts[] | select(.name=="INFRA-espn-data") | .size_in_bytes' \
                2>/dev/null || echo 0)
              echo "$count $rid"
            done | sort -rn | head -1 | awk '{print $2}')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Validate artifact run IDs
        run: |
          if [ -z "${{ steps.get_ml_run.outputs.run_id }}" ]; then
            echo "[WARN] No successful market_lines run with INFRA-market-lines artifact found; skipping market artifact downloads"
          fi
          if [ -z "${{ steps.get_espn_run.outputs.run_id }}" ]; then
            echo "[WARN] No successful update_espn_cbb run with INFRA-espn-data artifact found; skipping ESPN artifact download"
          fi

      # Handoff from market_lines.yml
      - name: Download market lines
        if: ${{ steps.get_ml_run.outputs.run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: INFRA-market-lines
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_ml_run.outputs.run_id }}


      - name: Download predictions with context
        if: ${{ steps.get_ml_run.outputs.run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: INFRA-predictions-with-context
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_ml_run.outputs.run_id }}


      # Handoff from update_espn_cbb.yml
      - name: Download ESPN data
        if: ${{ steps.get_espn_run.outputs.run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: INFRA-espn-data
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_espn_run.outputs.run_id }}


      # Verify required input files exist with real data rows
      - name: Verify required input files
        run: |
          fail=0
          for f in data/market_lines.csv data/team_game_weighted.csv; do
            rows=$(( $(wc -l < "$f" 2>/dev/null || echo 0) - 1 ))
            if [ "$rows" -lt 1 ]; then
              echo "[ERROR] $f has $rows data rows — aborting"
              fail=1
            else
              echo "[OK] $f: $rows rows"
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Install pandas for artifact merge
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas
          python -c "import pandas" || { echo "[ERROR] pandas install failed"; exit 1; }

      - name: Merge staged artifacts into committed history
        run: |
          python - <<'PY'
          import pandas as pd
          from pandas.errors import EmptyDataError
          from pathlib import Path

          def safe_read_csv(path: Path) -> pd.DataFrame:
              try:
                  return pd.read_csv(path, dtype=str)
              except EmptyDataError:
                  print(f"[WARN] {path.name} is empty or headerless; treating as no rows")
                  return pd.DataFrame()

          MERGE_SPECS = [
              ("team_game_weighted.csv",  ["event_id", "team_id"]),
              ("team_game_logs.csv",      ["event_id", "team_id"]),
              ("games.csv",               ["game_id"]),
              ("player_game_logs.csv",    ["event_id", "team_id", "athlete_id"]),
              ("market_lines.csv",        ["game_id", "capture_type"]),
              ("predictions_with_context.csv", ["game_id"]),
              ("predictions_history.csv", ["game_id"]),
          ]
          for fname, keys in MERGE_SPECS:
              committed = Path(f"data/{fname}")
              staged = Path(f"data/staging/{fname}")
              if not staged.exists() or staged.stat().st_size == 0:
                  print(f"[SKIP] No staged {fname}")
                  continue
              existing = safe_read_csv(committed) if committed.exists() else pd.DataFrame()
              new_rows = safe_read_csv(staged)
              if new_rows.empty:
                  print(f"[SKIP] Staged {fname} has no parseable rows")
                  continue
              combined = pd.concat([existing, new_rows], ignore_index=True)
              if "game_id" in keys and "game_id" not in combined.columns and "event_id" in combined.columns:
                  combined["game_id"] = combined["event_id"]
              available = [k for k in keys if k in combined.columns]
              if not available:
                  print(f"[WARN] {fname}: none of merge keys present {keys}; writing concatenated rows")
              else:
                  combined = combined.drop_duplicates(subset=available, keep="last")
              committed.parent.mkdir(parents=True, exist_ok=True)
              combined.to_csv(committed, index=False)
              print(f"[OK] {fname}: {len(existing)} + {len(new_rows)} = {len(combined)} rows")
          PY

      - name: Backfill historical market lines (rolling 14 days)
        run: |
          python ingestion/historical_backfill.py \
            --days-back 14 \
            --output data/market_lines.csv
        continue-on-error: true

      - name: Check market join coverage
        continue-on-error: true
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          from datetime import date

          preds = Path("data/predictions_with_context.csv")
          mkt   = Path("data/market_lines.csv")
          if not preds.exists() or preds.stat().st_size == 0:
              preds = Path("data/predictions_combined_latest.csv")
          if not preds.exists() or not mkt.exists():
              print("[MARKET-GATE] Missing input files — skipping coverage check")
              raise SystemExit(0)

          df  = pd.read_csv(preds, dtype=str)
          mdf = pd.read_csv(mkt,   dtype=str)

          today = str(date.today())
          if "game_date" in df.columns:
              df = df[df["game_date"].str.startswith(today, na=False)]
          if df.empty:
              print(f"[MARKET-GATE] No predictions for {today} — skipping")
              raise SystemExit(0)

          df["_eid"]  = df.get("event_id", df.get("game_id", pd.Series(dtype=str))).astype(str).str.strip()
          mdf["_eid"] = mdf["event_id"].astype(str).str.strip()

          matched  = df["_eid"].isin(mdf["_eid"]).sum()
          total    = len(df)
          coverage = matched / total if total else 0

          print(f"[MARKET-GATE] Today's market join coverage: {matched}/{total} ({coverage:.0%})")
          if coverage < 0.80:
              print(f"[MARKET-GATE] WARNING: coverage {coverage:.0%} is below 80% threshold")
          PY

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy; import bs4" || \
            { echo "[ERROR] Core dependency import failed"; exit 1; }

      - name: Data infrastructure health check
        run: python scripts/validate_data_infrastructure.py
        continue-on-error: true

      # Step 5: Run backtester (if requested or weekly)
      - name: Run backtester
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * 1' || github.event.inputs.run_mode == 'both' || github.event.inputs.run_mode == 'backtest_only'
        run: |
          BACKFILL_ARGS=""
          BACKTEST_ARGS="--min-games 5"
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            BACKFILL_ARGS="$BACKFILL_ARGS --start-date ${{ github.event.inputs.start_date }}"
            BACKTEST_ARGS="$BACKTEST_ARGS --start-date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            BACKFILL_ARGS="$BACKFILL_ARGS --end-date ${{ github.event.inputs.end_date }}"
            BACKTEST_ARGS="$BACKTEST_ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi

          echo "Running historical backfill with args: $BACKFILL_ARGS"
          python ingestion/historical_backfill.py $BACKFILL_ARGS

          echo "Running backtester with args: $BACKTEST_ARGS"
          python cbb_backtester.py $BACKTEST_ARGS

      # Step 6: Pattern 2: Validate backtester outputs
      - name: Validate backtester outputs
        if: success()
        run: |
          if [ -f data/backtest_results_latest.csv ]; then
            rows=$(( $(wc -l < data/backtest_results_latest.csv) - 1 ))
            echo "[OK] backtest_results_latest.csv: $rows rows"
            python scripts/validate_backtest_market_data.py
          else
            echo "[WARN] No backtester output found"
          fi

      # Step 7: Grade predictions first so tracker can consume CLV fields
      - name: Grade predictions
        run: python evaluation/predictions_graded.py
        continue-on-error: false

      # Step 8: Run analytics/reporting scripts

      - name: Build training data
        run: python build_training_data.py
        continue-on-error: true

      - name: Run results tracker
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * *' || github.event.inputs.run_mode == 'both' || github.event.inputs.run_mode == 'tracker_only'
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            echo "Running results tracker for specific date: ${{ github.event.inputs.start_date }}"
            python cbb_results_tracker.py --date ${{ github.event.inputs.start_date }}
          else
            echo "Running results tracker with reprocess-days 10 to catch up on missed dates"
            python cbb_results_tracker.py --reprocess-days 10
          fi

      - name: Run season summaries
        run: python cbb_season_summaries.py || echo "Summaries failed (non-fatal)"

      - name: Accuracy report
        run: python cbb_accuracy_report.py
        continue-on-error: false

      - name: Upload analytics results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-analytics-results
          path: |
            data/results_log.csv
            data/results_summary.csv
            data/backtest_results_latest.csv
            data/team_season_summary.csv
            data/market_lines_closing.csv
            data/unresolved_games.csv
            data/market_line_backfill_audit.csv
            data/backtest_training_data.csv
          retention-days: 90

      # Step 9: Pattern 9: Standardized commit step with retry logic
      - name: Commit to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git add data/backtest_training_data.csv
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          git commit -m "analytics: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
