name: CBB Analytics

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 10 * * 1"
  workflow_run:
    workflows: ["Market Lines Capture", "CBB Predictions Rolling"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "What to run"
        default: "both"
        type: choice
        options: ["tracker_only", "backtest_only", "both"]
      start_date:
        description: "Optional start date filter (YYYYMMDD)"
        required: false
        type: string
      end_date:
        description: "Optional end date filter (YYYYMMDD)"
        required: false
        type: string
  workflow_call:
    inputs:
      run_mode:
        required: false
        default: "both"
        type: string
      start_date:
        required: false
        default: ""
        type: string
      end_date:
        required: false
        default: ""
        type: string

concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  TZ: UTC
  PYTHONHASHSEED: "0"
  ESPN_FALLBACK_DAYS_BACK: "3"

jobs:
  analytics:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy, bs4, yaml"

      - name: Resolve analytics run mode
        id: resolve_mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_RUN_MODE: ${{ github.event.inputs.run_mode || inputs.run_mode || '' }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date || inputs.start_date || '' }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date || inputs.end_date || '' }}
        run: |
          set -euo pipefail

          RUN_MODE="${INPUT_RUN_MODE:-both}"
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            if [[ "$EVENT_SCHEDULE" == "0 8 * * *" ]]; then
              RUN_MODE="tracker_only"
            elif [[ "$EVENT_SCHEDULE" == "0 10 * * 1" ]]; then
              RUN_MODE="backtest_only"
            fi
          fi

          case "$RUN_MODE" in
            tracker_only|backtest_only|both) ;;
            *) echo "[ERROR] invalid run_mode: $RUN_MODE"; exit 1 ;;
          esac

          START_DATE="${INPUT_START_DATE:-}"
          END_DATE="${INPUT_END_DATE:-}"
          if [[ (-n "$START_DATE" && ! "$START_DATE" =~ ^[0-9]{8}$) || (-n "$END_DATE" && ! "$END_DATE" =~ ^[0-9]{8}$) ]]; then
            echo "[ERROR] Invalid date input(s). start_date='$START_DATE' end_date='$END_DATE'. Required format: YYYYMMDD."
            exit 1
          fi

          echo "[INFO] Resolved analytics inputs: event=$EVENT_NAME schedule='${EVENT_SCHEDULE:-}' run_mode=$RUN_MODE start_date='${START_DATE:-<none>}' end_date='${END_DATE:-<none>}'"
          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"
          echo "start_date=$START_DATE" >> "$GITHUB_OUTPUT"
          echo "end_date=$END_DATE" >> "$GITHUB_OUTPUT"

      - name: Resolve latest Market Lines run ID
        id: get_ml_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          run_id=$(gh run list \
            --workflow=market_lines.yml \
            --status=success \
            --limit=20 \
            --json=databaseId \
            --jq='.[].databaseId' | while read rid; do
              count=$(gh api \
                /repos/${{ github.repository }}/actions/runs/${rid}/artifacts \
                --jq '.artifacts[] | select(.name=="INFRA-market-lines") | .size_in_bytes' \
                2>/dev/null || echo 0)
              echo "$count $rid"
            done | sort -rn | head -1 | awk '{print $2}')
          if [[ -z "$run_id" ]]; then
            echo "[ERROR] No successful market_lines run with INFRA-market-lines artifact found"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Resolve latest predictions rolling run ID
        id: get_pred_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          run_id=$(gh run list \
            --workflow=cbb_predictions_rolling.yml \
            --status=success \
            --limit=20 \
            --json=databaseId \
            --jq='.[].databaseId' | while read rid; do
              count=$(gh api \
                /repos/${{ github.repository }}/actions/runs/${rid}/artifacts \
                --jq '.artifacts[] | select(.name=="INFRA-predictions-rolling") | .size_in_bytes' \
                2>/dev/null || echo 0)
              echo "$count $rid"
            done | sort -rn | head -1 | awk '{print $2}')
          if [[ -z "$run_id" ]]; then
            echo "[ERROR] No successful cbb_predictions_rolling run with INFRA-predictions-rolling artifact found"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Print current artifact dependency chain
        run: |
          set -euo pipefail
          {
            echo "Current artifact dependency chain:"
            echo "1) update_espn_cbb.yml -> INFRA-espn-data (best effort download from main)"
            echo "2) market_lines.yml -> INFRA-market-lines + INFRA-predictions-with-context"
            echo "3) cbb_predictions_rolling.yml -> INFRA-predictions-rolling + INFRA-ready-cbb-predictions-rolling"
            echo "4) cbb_analytics.yml -> merges staged artifacts; runs ESPN fallback pipeline if Tier A missing/invalid"
          } | tee /tmp/cbb_artifact_chain.log
          {
            echo "## Current Artifact Dependency Chain"
            echo
            sed 's/^/- /' /tmp/cbb_artifact_chain.log
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download latest ESPN data artifact from main (Tier A)
        id: download_espn_artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python .github/scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow-file "update_espn_cbb.yml" \
            --artifact-name "INFRA-espn-data" \
            --branch "main" \
            --max-runs 50 \
            --dest "data/staging"

      - name: Download market lines artifact
        uses: actions/download-artifact@v4
        with:
          name: INFRA-market-lines
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_ml_run.outputs.run_id }}

      - name: Download predictions with context artifact
        uses: actions/download-artifact@v4
        with:
          name: INFRA-predictions-with-context
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_ml_run.outputs.run_id }}

      - name: Download predictions rolling artifact
        uses: actions/download-artifact@v4
        with:
          name: INFRA-predictions-rolling
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_pred_run.outputs.run_id }}

      - name: Download predictions ready marker
        uses: actions/download-artifact@v4
        with:
          name: INFRA-ready-cbb-predictions-rolling
          path: data/staging/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_pred_run.outputs.run_id }}

      - name: Validate dependency marker
        run: |
          if [[ ! -f data/staging/cbb_predictions_rolling_ready.json ]]; then
            echo "[ERROR] Missing dependency marker: data/staging/cbb_predictions_rolling_ready.json"
            exit 1
          fi
          echo "[OK] Found predictions ready marker"

      - name: Merge staged artifacts into working data
        run: |
          python - <<'PY'
          from pathlib import Path

          import pandas as pd
          from pandas.errors import EmptyDataError

          def safe_read_csv(path: Path) -> pd.DataFrame:
              try:
                  return pd.read_csv(path, dtype=str, low_memory=False)
              except EmptyDataError:
                  return pd.DataFrame()

          merge_specs = [
              ("team_game_weighted.csv", ["event_id", "team_id"]),
              ("team_game_logs.csv", ["event_id", "team_id"]),
              ("games.csv", ["game_id"]),
              ("team_pretournament_snapshot.csv", ["team_id"]),
              ("player_game_logs.csv", ["event_id", "team_id", "athlete_id"]),
              ("market_lines.csv", ["game_id", "capture_type"]),
              ("predictions_with_context.csv", ["game_id"]),
              ("predictions_history.csv", ["game_id"]),
              ("predictions_combined_latest.csv", ["game_id"]),
              ("predictions_latest.csv", ["game_id"]),
          ]

          for file_name, keys in merge_specs:
              committed = Path(f"data/{file_name}")
              staged = Path(f"data/staging/{file_name}")
              if not staged.exists() or staged.stat().st_size == 0:
                  print(f"[SKIP] No staged {file_name}")
                  continue

              existing = safe_read_csv(committed) if committed.exists() else pd.DataFrame()
              new_rows = safe_read_csv(staged)
              if new_rows.empty:
                  print(f"[SKIP] Staged {file_name} is empty")
                  continue

              combined = pd.concat([existing, new_rows], ignore_index=True)
              if "game_id" in keys and "game_id" not in combined.columns and "event_id" in combined.columns:
                  combined["game_id"] = combined["event_id"]
              available = [k for k in keys if k in combined.columns]
              if available:
                  combined = combined.drop_duplicates(subset=available, keep="last")
              else:
                  print(f"[WARN] {file_name}: merge keys missing {keys}; writing concatenated rows")

              committed.parent.mkdir(parents=True, exist_ok=True)
              combined.to_csv(committed, index=False)
              print(f"[OK] {file_name}: rows={len(combined)}")
          PY

      - name: Determine ESPN fallback requirement
        id: ensure_espn_inputs
        env:
          ESPN_TIER_A_OUTCOME: ${{ steps.download_espn_artifact.outcome }}
        run: |
          set -euo pipefail

          declare -a REASONS=()

          validate_required_csv() {
            local path="$1"
            local min_rows="$2"
            local required_cols="$3"
            local tmp_log
            tmp_log="$(mktemp)"
            if bash .github/scripts/check_csv.sh "$path" "$min_rows" "$required_cols" >"$tmp_log" 2>&1; then
              cat "$tmp_log"
              rm -f "$tmp_log"
              return 0
            fi
            local msg
            msg="$(tr '\n' ' ' <"$tmp_log" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
            REASONS+=("$msg")
            rm -f "$tmp_log"
            return 1
          }

          if [[ "$ESPN_TIER_A_OUTCOME" != "success" ]]; then
            REASONS+=("Tier A artifact download outcome: ${ESPN_TIER_A_OUTCOME}")
          fi

          validate_required_csv "data/games.csv" 1 "game_id" || true
          validate_required_csv "data/team_game_weighted.csv" 1 "team_id" || true
          validate_required_csv "data/team_pretournament_snapshot.csv" 1 "team_id" || true
          validate_required_csv "data/team_pretournament_snapshot.csv" 1 "team_id" || true

          USED_FALLBACK="false"
          FALLBACK_REASON="none"
          if (( ${#REASONS[@]} > 0 )); then
            USED_FALLBACK="true"
            FALLBACK_REASON="$(printf '%s | ' "${REASONS[@]}")"
            FALLBACK_REASON="${FALLBACK_REASON% | }"
            echo "[WARN] ESPN fallback required: ${FALLBACK_REASON}"
          else
            echo "[OK] ESPN inputs available without fallback"
          fi

          echo "used_fallback=${USED_FALLBACK}" >> "$GITHUB_OUTPUT"
          echo "fallback_reason=${FALLBACK_REASON}" >> "$GITHUB_OUTPUT"

      - name: Run ESPN fallback pipeline
        if: steps.ensure_espn_inputs.outputs.used_fallback == 'true'
        run: |
          set -euo pipefail
          echo "[INFO] Running fallback: python espn_pipeline.py --days-back ${ESPN_FALLBACK_DAYS_BACK}"
          python espn_pipeline.py --days-back "${ESPN_FALLBACK_DAYS_BACK}"
          bash .github/scripts/check_csv.sh data/games.csv 1 "game_id"
          bash .github/scripts/check_csv.sh data/team_game_weighted.csv 1 "team_id"
          bash .github/scripts/check_csv.sh data/team_pretournament_snapshot.csv 1 "team_id"

      - name: Upload fallback ESPN artifact bundle
        if: always() && steps.ensure_espn_inputs.outputs.used_fallback == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-espn-data
          if-no-files-found: error
          retention-days: 30
          path: |
            data/games.csv
            data/team_game_weighted.csv
            data/team_pretournament_snapshot.csv
            data/team_game_logs.csv
            data/player_game_logs.csv

      - name: Evaluate analytics input availability
        id: gate_inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          ESPN_TIER_A_OUTCOME: ${{ steps.download_espn_artifact.outcome }}
          ESPN_FALLBACK_USED: ${{ steps.ensure_espn_inputs.outputs.used_fallback }}
          ESPN_FALLBACK_REASON: ${{ steps.ensure_espn_inputs.outputs.fallback_reason }}
        run: |
          set -euo pipefail

          REPORT_DIR="data/integrity_reports/cbb_analytics/${GITHUB_RUN_ID}"
          SUMMARY_PATH="${REPORT_DIR}/INTEGRITY_EXEC_SUMMARY.md"
          mkdir -p "$REPORT_DIR"

          declare -a FILE_ERRORS=()

          validate_required_csv() {
            local path="$1"
            local min_rows="$2"
            local required_cols="$3"
            local tmp_log
            tmp_log="$(mktemp)"
            if bash .github/scripts/check_csv.sh "$path" "$min_rows" "$required_cols" >"$tmp_log" 2>&1; then
              cat "$tmp_log"
              rm -f "$tmp_log"
              return 0
            fi
            local msg
            msg="$(tr '\n' ' ' <"$tmp_log" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
            FILE_ERRORS+=("$msg")
            rm -f "$tmp_log"
            return 1
          }

          validate_required_csv "data/games.csv" 1 "game_id" || true
          validate_required_csv "data/team_game_weighted.csv" 1 "team_id" || true

          BLOCKED="false"
          ALLOW_SKIP="false"
          STATUS="READY"
          INPUT_SOURCE="tier_a_artifact"

          if [[ "$ESPN_FALLBACK_USED" == "true" ]]; then
            INPUT_SOURCE="fallback_pipeline"
          elif [[ "$ESPN_TIER_A_OUTCOME" != "success" ]]; then
            INPUT_SOURCE="tier_b_repo_data"
          fi

          if (( ${#FILE_ERRORS[@]} > 0 )); then
            BLOCKED="true"
            STATUS="BLOCKED"
            INPUT_SOURCE="none"
            if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              ALLOW_SKIP="true"
            fi
          fi

          {
            echo "# CBB Analytics Integrity Execution Summary"
            echo
            echo "- status: ${STATUS}"
            echo "- workflow: cbb_analytics"
            echo "- event: ${EVENT_NAME}"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- input_source: ${INPUT_SOURCE}"
            if [[ "$ESPN_TIER_A_OUTCOME" == "success" ]]; then
              echo "- tier_a_artifact: downloaded `INFRA-espn-data` from `update_espn_cbb.yml` on branch `main`"
            elif [[ "$ESPN_FALLBACK_USED" == "true" ]]; then
              echo "- tier_a_artifact: unavailable (`${ESPN_TIER_A_OUTCOME}`); fallback pipeline executed in this run"
              echo "- fallback_reason: ${ESPN_FALLBACK_REASON}"
            else
              echo "- tier_a_artifact: missing `INFRA-espn-data` from latest successful `update_espn_cbb.yml` run on branch `main`"
              echo "- tier_b_fallback: validating repo-committed `data/` ESPN CSVs"
            fi
            echo
            if (( ${#FILE_ERRORS[@]} > 0 )); then
              echo "## Missing/Invalid Required Files"
              echo
              for err in "${FILE_ERRORS[@]}"; do
                echo "- ${err}"
              done
              echo
              echo "## Next Action Required"
              echo
              echo "- Required ESPN CSVs were still invalid after fallback handling. Inspect debug bundle + integrity summary."
            else
              echo "## Result"
              echo
              echo "- Required ESPN inputs are valid; analytics may proceed."
            fi
          } > "$SUMMARY_PATH"

          echo "blocked=${BLOCKED}" >> "$GITHUB_OUTPUT"
          echo "allow_skip=${ALLOW_SKIP}" >> "$GITHUB_OUTPUT"
          echo "summary_path=${SUMMARY_PATH}" >> "$GITHUB_OUTPUT"

      - name: Validate required analytics inputs
        if: steps.gate_inputs.outputs.blocked != 'true'
        run: |
          bash .github/scripts/check_csv.sh data/market_lines.csv 1 event_id
          bash .github/scripts/check_csv.sh data/team_game_weighted.csv 1 team_id
          if [[ -f data/predictions_with_context.csv ]]; then
            bash .github/scripts/check_csv.sh data/predictions_with_context.csv 0 game_id
          else
            bash .github/scripts/check_csv.sh data/predictions_combined_latest.csv 0 game_id
          fi

      - name: Build context overlay
        if: steps.gate_inputs.outputs.blocked != 'true'
        run: |
          python context_layers/run_all.py \
            --data-dir data \
            --output-csv data/context/context_overlay_latest.csv \
            --output-md data/context/context_overlay_exec_summary.md

      - name: Validate context overlay
        if: steps.gate_inputs.outputs.blocked != 'true'
        run: |
          bash .github/scripts/check_csv.sh data/context/context_overlay_latest.csv 0 event_id

      - name: Validate predictions freshness
        if: steps.gate_inputs.outputs.blocked != 'true'
        run: |
          python - <<'PY'
          from pathlib import Path
          import time

          candidate = Path("data/predictions_with_context.csv")
          if not candidate.exists():
              candidate = Path("data/predictions_combined_latest.csv")
          if not candidate.exists():
              raise SystemExit("[ERROR] Missing predictions input for analytics freshness check")

          age_hours = (time.time() - candidate.stat().st_mtime) / 3600.0
          print(f"[INFO] {candidate} age_hours={age_hours:.2f}")
          if age_hours > 36:
              raise SystemExit(f"[ERROR] {candidate} is stale (>36h)")
          PY

      - name: Data infrastructure health check
        if: steps.gate_inputs.outputs.blocked != 'true'
        continue-on-error: true
        run: python scripts/validate_data_infrastructure.py

      - name: Backfill historical market lines (rolling 14 days)
        if: steps.gate_inputs.outputs.blocked != 'true'
        continue-on-error: true
        run: python ingestion/historical_backfill.py --days-back 14 --output data/market_lines.csv

      - name: Run backtester
        if: steps.gate_inputs.outputs.blocked != 'true' && (steps.resolve_mode.outputs.run_mode == 'both' || steps.resolve_mode.outputs.run_mode == 'backtest_only')
        run: |
          set -euo pipefail
          BACKFILL_ARGS=""
          BACKTEST_ARGS="--min-games 5"
          if [[ -n "${{ steps.resolve_mode.outputs.start_date }}" ]]; then
            BACKFILL_ARGS="$BACKFILL_ARGS --start-date ${{ steps.resolve_mode.outputs.start_date }}"
            BACKTEST_ARGS="$BACKTEST_ARGS --start-date ${{ steps.resolve_mode.outputs.start_date }}"
          fi
          if [[ -n "${{ steps.resolve_mode.outputs.end_date }}" ]]; then
            BACKFILL_ARGS="$BACKFILL_ARGS --end-date ${{ steps.resolve_mode.outputs.end_date }}"
            BACKTEST_ARGS="$BACKTEST_ARGS --end-date ${{ steps.resolve_mode.outputs.end_date }}"
          fi

          python ingestion/historical_backfill.py $BACKFILL_ARGS
          python cbb_backtester.py $BACKTEST_ARGS

      - name: Validate backtester outputs
        if: steps.gate_inputs.outputs.blocked != 'true' && (steps.resolve_mode.outputs.run_mode == 'both' || steps.resolve_mode.outputs.run_mode == 'backtest_only')
        run: |
          bash .github/scripts/check_csv.sh data/backtest_results_latest.csv 1
          python scripts/validate_backtest_market_data.py

      - name: Grade predictions
        if: steps.gate_inputs.outputs.blocked != 'true'
        run: python evaluation/predictions_graded.py

      - name: Build training data
        if: steps.gate_inputs.outputs.blocked != 'true'
        continue-on-error: true
        run: python build_training_data.py

      - name: Run results tracker
        if: steps.gate_inputs.outputs.blocked != 'true' && (steps.resolve_mode.outputs.run_mode == 'both' || steps.resolve_mode.outputs.run_mode == 'tracker_only')
        run: |
          if [[ -n "${{ steps.resolve_mode.outputs.start_date }}" ]]; then
            python cbb_results_tracker.py --date ${{ steps.resolve_mode.outputs.start_date }}
          else
            python cbb_results_tracker.py --reprocess-days 10
          fi

      - name: Run season summaries
        if: steps.gate_inputs.outputs.blocked != 'true'
        continue-on-error: true
        run: python cbb_season_summaries.py

      - name: Accuracy report
        if: steps.gate_inputs.outputs.blocked != 'true'
        run: python cbb_accuracy_report.py

      - name: Run gate builder
        if: steps.gate_inputs.outputs.blocked != 'true'
        continue-on-error: true
        run: |
          python scripts/gate_builder.py \
            --data-dir data \
            --output-results-csv data/gates/gate_results.csv \
            --output-best-csv data/gates/gate_rules_best.csv \
            --output-md data/gates/gate_exec_summary.md

      - name: Run segment performance explorer
        if: steps.gate_inputs.outputs.blocked != 'true'
        continue-on-error: true
        run: |
          python scripts/segment_performance_explorer.py \
            --data-dir data \
            --output-csv data/analytics/segment_performance.csv \
            --output-md data/analytics/segment_exec_summary.md \
            --min-sample 25

      - name: Create ready marker
        if: always() && steps.gate_inputs.outputs.blocked != 'true'
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          marker = {
              "workflow": "cbb_analytics",
              "run_id": "${{ github.run_id }}",
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "outputs": [
                  "data/results_log.csv",
                  "data/results_summary.csv",
                  "data/context/context_overlay_latest.csv",
                  "data/gates/gate_results.csv",
                  "data/analytics/segment_performance.csv"
              ]
          }
          out = Path("data/ready_markers/cbb_analytics_ready.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(marker, indent=2), encoding="utf-8")
          print(f"[OK] wrote {out}")
          PY

      - name: Generate integrity report
        if: always() && steps.gate_inputs.outputs.blocked != 'true'
        run: |
          python .github/scripts/data_integrity_report.py \
            --manifest .github/pipeline_contracts/cbb_analytics.contract.json \
            --workflow-name cbb_analytics \
            --run-id "${{ github.run_id }}"

      - name: Debug data state (always)
        if: always()
        env:
          ESPN_TIER_A_OUTCOME: ${{ steps.download_espn_artifact.outcome }}
          ESPN_FALLBACK_USED: ${{ steps.ensure_espn_inputs.outputs.used_fallback }}
          ESPN_FALLBACK_REASON: ${{ steps.ensure_espn_inputs.outputs.fallback_reason }}
        run: |
          set +e
          mkdir -p data/debug
          DEBUG_PATH="data/debug/cbb_analytics_debug_state.txt"
          {
            echo "# CBB Analytics Debug State"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "espn_tier_a_outcome=${ESPN_TIER_A_OUTCOME}"
            echo "espn_fallback_used=${ESPN_FALLBACK_USED}"
            echo "espn_fallback_reason=${ESPN_FALLBACK_REASON}"
            echo
            echo "## data/ tree (depth 2)"
            if [[ -d data ]]; then
              find data -maxdepth 2 -print | sort
            else
              echo "[MISSING] data directory"
            fi
            echo
            echo "## key csv row counts"
          } > "$DEBUG_PATH"
          python - <<'PY' >> "$DEBUG_PATH"
          from pathlib import Path

          import pandas as pd
          from pandas.errors import EmptyDataError

          files = [
              "data/games.csv",
              "data/team_game_weighted.csv",
              "data/team_pretournament_snapshot.csv",
              "data/market_lines.csv",
              "data/predictions_with_context.csv",
              "data/predictions_combined_latest.csv",
              "data/predictions_latest.csv",
          ]

          for rel in files:
              path = Path(rel)
              if not path.exists():
                  print(f"[MISSING] {rel}")
                  continue
              try:
                  df = pd.read_csv(path, low_memory=False)
                  print(f"[OK] {rel}: rows={len(df)} cols={len(df.columns)}")
              except EmptyDataError:
                  print(f"[OK] {rel}: rows=0 cols=0 (empty)")
              except Exception as exc:
                  print(f"[ERROR] {rel}: {exc}")
          PY
          cat "$DEBUG_PATH"

      - name: Upload analytics integrity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-cbb-analytics-integrity
          if-no-files-found: error
          path: data/integrity_reports/cbb_analytics/**
          retention-days: 90

      - name: Upload analytics debug bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-cbb-analytics-debug
          if-no-files-found: error
          path: |
            data/debug/cbb_analytics_debug_state.txt
            data/integrity_reports/cbb_analytics/**
          retention-days: 30

      - name: Upload analytics outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-analytics-results
          if-no-files-found: warn
          path: |
            data/results_log.csv
            data/results_summary.csv
            data/backtest_results_latest.csv
            data/team_season_summary.csv
            data/market_lines_closing.csv
            data/unresolved_games.csv
            data/market_line_backfill_audit.csv
            data/backtest_training_data.csv
            data/context/context_overlay_latest.csv
            data/context/context_overlay_exec_summary.md
            data/gates/gate_results.csv
            data/gates/gate_rules_best.csv
            data/gates/gate_exec_summary.md
            data/analytics/segment_performance.csv
            data/analytics/segment_exec_summary.md
            data/ready_markers/cbb_analytics_ready.json
          retention-days: 90

      - name: Upload analytics ready marker
        if: always() && steps.gate_inputs.outputs.blocked != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: INFRA-ready-cbb-analytics
          if-no-files-found: error
          path: data/ready_markers/cbb_analytics_ready.json
          retention-days: 30

      - name: Commit curated analytics outputs
        if: success() && steps.gate_inputs.outputs.blocked != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --ignore-missing \
            data/results_log.csv \
            data/results_summary.csv \
            data/results_alerts.csv \
            data/results_model_split.csv \
            data/results_log_by_team.csv \
            data/backtest_results_latest.csv \
            data/backtest_model_report_latest.csv \
            data/backtest_calibration_latest.csv \
            data/backtest_training_data.csv \
            data/team_season_summary.csv \
            data/player_season_summary.csv \
            data/market_lines_closing.csv

          if git diff --staged --quiet; then
            echo "[SKIP] No curated output changes to commit"
            exit 0
          fi

          STAGED_BYTES=$(git diff --cached --name-only -z | xargs -0 -r du -cb | tail -n 1 | cut -f1)
          STAGED_BYTES=${STAGED_BYTES:-0}
          MAX_BYTES=$((50 * 1024 * 1024))
          if (( STAGED_BYTES > MAX_BYTES )); then
            echo "[ERROR] staged payload ${STAGED_BYTES} exceeds ${MAX_BYTES} bytes"
            exit 1
          fi

          git commit -m "analytics: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3; do
            if ! git pull --rebase origin main; then
              echo "[ERROR] rebase conflict while syncing main"
              git rebase --abort || true
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "[OK] Push succeeded attempt $i"
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "[ERROR] Push failed after 3 attempts"
          exit 1

      - name: Finalize blocked analytics status
        if: always() && steps.gate_inputs.outputs.blocked == 'true'
        run: |
          set -euo pipefail
          echo "[BLOCKED] Analytics inputs unavailable. See ${{ steps.gate_inputs.outputs.summary_path }}"
          if [[ "${{ steps.gate_inputs.outputs.allow_skip }}" == "true" ]]; then
            echo "[BLOCKED] workflow_dispatch run configured to allow skip; exiting 0."
            exit 0
          fi
          echo "[ERROR] Scheduled/automated analytics run blocked due to missing required inputs."
          exit 1
