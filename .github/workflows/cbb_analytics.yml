name: CBB Analytics

on:
  schedule:
    - cron: "0 8 * * *"     # Results tracker — daily 8 AM UTC
    - cron: "0 10 * * 1"    # Backtester — weekly Monday 10 AM UTC
  workflow_run:
    workflows: ["Market Lines Capture"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "What to run"
        default: "both"
        type: choice
        options: ["tracker_only", "backtest_only", "both"]
      start_date:
        description: "Optional start date filter (YYYYMMDD)"
        required: false
        type: string
      end_date:
        description: "Optional end date filter (YYYYMMDD)"
        required: false
        type: string

# Pattern 3: Standardized concurrency group to prevent race conditions across all pipeline workflows
concurrency:
  group: cbb-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Standard checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Download all required artifacts. Standardized names used.
      # Pattern: Use gh CLI to find latest successful run-id for cross-workflow downloads
      - name: Get latest Market Lines run ID
        id: get_ml_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=market_lines.yml \
            --status=success \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      - name: Get latest ESPN data run ID
        id: get_espn_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=update_espn_cbb.yml \
            --status=success \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId')
          echo "run_id=$run_id" >> $GITHUB_OUTPUT

      # Handoff from market_lines.yml
      - name: Download market lines
        uses: actions/download-artifact@v4
        with:
          name: cbb-market-lines
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_ml_run.outputs.run_id }}
        continue-on-error: true

      - name: Download predictions with context
        uses: actions/download-artifact@v4
        with:
          name: cbb-predictions-with-context
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_ml_run.outputs.run_id }}
        continue-on-error: true

      - name: Download rolling predictions (for MC calibration)
        uses: actions/download-artifact@v4
        with:
          name: cbb-predictions-rolling-latest
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || steps.get_espn_run.outputs.run_id }}
        continue-on-error: true

      # Handoff from update_espn_cbb.yml
      - name: Download ESPN data
        uses: actions/download-artifact@v4
        with:
          name: cbb-espn-data
          path: data/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get_espn_run.outputs.run_id }}
        continue-on-error: true

      # Pattern 1: Verify artifacts or bootstrap from git history to prevent silent failures
      - name: Verify artifacts or bootstrap from git
        run: |
          for f in data/market_lines.csv data/predictions_with_context.csv data/team_game_weighted.csv; do
            if [ ! -s "$f" ]; then
              echo "[WARN] $f missing or empty — attempting git restore"
              git show HEAD:"$f" > "$f" 2>/dev/null || echo "[WARN] $f not in git"
            fi
          done

      # Step 4: Pattern 5: Install dependencies with import guards
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, requests, scipy" || \
            { echo "[ERROR] Core dependency import failed"; exit 1; }

      # Step 5: Run backtester (if requested or weekly)
      - name: Run backtester
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * 1' || github.event.inputs.run_mode == 'both' || github.event.inputs.run_mode == 'backtest_only'
        run: |
          BACKTEST_ARGS="--min-games 5"
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            BACKTEST_ARGS="$BACKTEST_ARGS --start-date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            BACKTEST_ARGS="$BACKTEST_ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          echo "Running backtester with args: $BACKTEST_ARGS"
          python cbb_backtester.py $BACKTEST_ARGS

      # Step 6: Pattern 2: Validate backtester outputs
      - name: Validate backtester outputs
        if: always()
        run: |
          if [ -f data/backtest_results_latest.csv ]; then
            rows=$(( $(wc -l < data/backtest_results_latest.csv) - 1 ))
            echo "[OK] backtest_results_latest.csv: $rows rows"
          else
            echo "[WARN] No backtester output found"
          fi

      # Step 7: Run analytics/reporting scripts
      - name: Run results tracker
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * *' || github.event.inputs.run_mode == 'both' || github.event.inputs.run_mode == 'tracker_only'
        run: |
          TRACKER_ARGS=""
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            TRACKER_ARGS="--date ${{ github.event.inputs.start_date }}"
          fi
          echo "Running results tracker with args: ${TRACKER_ARGS:-<default>}"
          python cbb_results_tracker.py $TRACKER_ARGS

      - name: Run season summaries
        run: python cbb_season_summaries.py || echo "Summaries failed (non-fatal)"

      # Step 8: Pattern 10: Upload results even on failure
      - name: Grade predictions
        run: python evaluation/predictions_graded.py
        continue-on-error: false

      - name: Accuracy report
        run: python cbb_accuracy_report.py
        continue-on-error: false

      - name: Update model bias table
        run: |
          python -c "
          import pandas as pd
          from pathlib import Path
          df = pd.read_csv('data/predictions_graded.csv') if Path('data/predictions_graded.csv').exists() else None
          if df is not None and len(df[df.get('graded', pd.Series(dtype=bool))]) >= 50:
              import subprocess; subprocess.run(['python', 'models/bias_detector.py'], check=True)
          else:
              print('[SKIP] Fewer than 50 graded games — bias detector skipped')
          "
        continue-on-error: true

      - name: Update confidence calibration
        run: |
          python -c "
          import pandas as pd
          from pathlib import Path
          df = pd.read_csv('data/predictions_graded.csv') if Path('data/predictions_graded.csv').exists() else None
          if df is not None and len(df[df.get('graded', pd.Series(dtype=bool))]) >= 50:
              import subprocess; subprocess.run(['python', 'calibration_script.py'], check=True)
          else:
              print('[SKIP] Fewer than 50 graded games — calibration skipped')
          "
        continue-on-error: true

      - name: Upload analytics results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cbb-results-log
          path: |
            data/results_log.csv
            data/model_accuracy_summary.csv
            data/predictions_graded.csv
            data/model_bias_table.csv
            data/walk_forward_validation.json
            data/mc_calibration_curve.csv
            data/backtest_results_latest.csv
            data/team_season_summary.csv
          retention-days: 90

      # Step 9: Pattern 9: Standardized commit step with retry logic
      - name: Commit to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "[SKIP] No changes to commit"
            exit 0
          fi
          git commit -m "analytics: $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main --no-stat 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit
            }
            git push origin HEAD:main && { echo "[OK] Push succeeded attempt $i"; exit 0; }
            sleep $((i * 3))
          done
          echo "[WARN] Push failed after 5 attempts"
